<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>비행기 미사일 피하기 - Arcade Hub</title>
  <style>
    :root {
      --bg1: #07101f;
      --bg2: #132544;
      --panel: rgba(8, 13, 25, 0.78);
      --panel2: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.16);
      --text: #eef5ff;
      --muted: #aebbd1;
      --accent: #ffe16d;
      --danger: #ff5c5c;
      --good: #62e891;
      --blue: #6fd7ff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; min-height: 100%; margin: 0;
      background: radial-gradient(circle at 20% 20%, rgba(105, 180, 255, 0.16), transparent 32%),
                  radial-gradient(circle at 80% 80%, rgba(255, 225, 109, 0.1), transparent 32%),
                  var(--bg1);
      color: var(--text);
      font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }

    #app {
      position: relative; width: min(100vw, 500px); height: min(100vh, 850px);
      background: #000; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    canvas { width: 100%; height: 100%; display: block; }

    /* UI 레이어 */
    .ui-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px); z-index: 10; padding: 30px; text-align: center;
    }
    .ui-overlay.hidden { display: none; }

    .score-board {
      position: absolute; top: 20px; left: 0; right: 0; display: flex;
      justify-content: center; pointer-events: none; z-index: 5;
    }
    .score-card {
      background: var(--panel); padding: 10px 24px; border-radius: 16px;
      border: 1px solid var(--line); backdrop-filter: blur(4px);
    }
    .score-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 2px; }
    .score-val { font-size: 24px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }

    button {
      background: var(--accent); color: #000; border: none; padding: 16px 32px;
      border-radius: 14px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    button:active { transform: scale(0.96); }

    .mobile-controls {
      position: absolute; bottom: 30px; left: 0; right: 0; display: grid;
      grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 25px; pointer-events: none;
    }
    .btn-ctrl {
      pointer-events: auto; background: var(--panel2); border: 1px solid var(--line);
      height: 65px; border-radius: 18px; color: var(--text); display: flex;
      align-items: center; justify-content: center; font-size: 20px;
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="score-board">
      <div class="score-card">
        <div class="score-label">FLIGHT TIME</div>
        <div id="scoreVal" class="score-val">0.0s</div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay" class="ui-overlay">
      <h1 id="title" style="font-size: 32px; color: var(--accent); margin: 0;">SKY DODGE</h1>
      <p id="msg" style="color: var(--muted); margin: 15px 0 30px; line-height: 1.5;">미사일의 추격을 뿌리치고<br>최대한 오래 생존하세요!</p>
      
      <div id="resultBox" style="display:none; margin-bottom: 30px;">
        <div style="font-size:14px; color:var(--muted)">생존 시간</div>
        <div id="finalScore" style="font-size:54px; font-weight:900; color:var(--accent)">0.0s</div>
      </div>

      <button id="startBtn">비행 시작</button>
    </div>

    <div class="mobile-controls">
      <div class="btn-ctrl" style="grid-column: 2" data-hold="up">▲</div>
      <div class="btn-ctrl" style="grid-row: 2" data-hold="left">◀</div>
      <div class="btn-ctrl" style="grid-row: 2" data-hold="down">▼</div>
      <div class="btn-ctrl" style="grid-row: 2" data-hold="right">▶</div>
      <div id="mobileRestart" class="btn-ctrl" style="grid-column: 2; margin-top: 10px; font-size: 14px; font-weight: bold;">RETRY</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreVal = document.getElementById("scoreVal");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const resultBox = document.getElementById("resultBox");
    const finalScoreTxt = document.getElementById("finalScore");

    canvas.width = 500;
    canvas.height = 850;

    const state = {
      running: false,
      gameOver: false,
      time: 0,
      lastTime: 0,
      player: { x: 250, y: 600, radius: 15, speed: 350 },
      enemies: []
    };

    const input = { up: false, down: false, left: false, right: false };

    // --- [Firebase 랭킹 저장 로직] ---
    function saveRank(score) {
      if (score < 5) return; // 5초 이상 생존 시에만 등록

      if (parent && parent.db) {
        setTimeout(() => {
          const playerName = prompt(`${score}초 생존! 랭킹에 이름을 남기시겠습니까?`, "에이스");
          if (playerName) {
            const fileName = window.location.pathname.split('/').pop() || 'sky_dodge';
            const collectionId = "rankings_" + fileName.replace('.html', '').replace(/\s/g, '_').replace(/%20/g, '_');

            parent.db.collection(collectionId).add({
              name: playerName,
              score: parseFloat(score),
              timestamp: new Date()
            }).then(() => {
              alert("랭킹 등록 완료!");
            }).catch(e => console.error("Firebase Error:", e));
          }
        }, 500);
      }
    }

    function toggleGame() {
      if (state.gameOver) {
        restart();
      } else {
        state.running = !state.running;
        overlay.classList.toggle("hidden", state.running);
        if (state.running) requestAnimationFrame(loop);
      }
    }

    function restart() {
      state.time = 0;
      state.gameOver = false;
      state.player.x = 250;
      state.player.y = 600;
      state.enemies = [];
      state.running = true;
      scoreVal.innerText = "0.0s";
      overlay.classList.add("hidden");
      resultBox.style.display = "none";
      requestAnimationFrame(loop);
    }

    function update(dt) {
      if (!state.running || state.gameOver) return;

      state.time += dt;
      scoreVal.innerText = state.time.toFixed(1) + "s";

      // 이동 로직
      let speed = state.player.speed * dt;
      if (input.up) state.player.y -= speed;
      if (input.down) state.player.y += speed;
      if (input.left) state.player.x -= speed;
      if (input.right) state.player.x += speed;

      // 경계 체크
      state.player.x = Math.max(state.player.radius, Math.min(canvas.width - state.player.radius, state.player.x));
      state.player.y = Math.max(state.player.radius, Math.min(canvas.height - state.player.radius, state.player.y));

      // 미사일 생성 (시간이 지날수록 빈도 증가)
      if (Math.random() < 0.03 + (state.time * 0.002)) {
        state.enemies.push({
          x: Math.random() * canvas.width,
          y: -30,
          vx: (Math.random() - 0.5) * 100,
          vy: 200 + Math.random() * 200 + (state.time * 5)
        });
      }

      // 미사일 업데이트 및 충돌
      state.enemies.forEach((en, i) => {
        en.x += en.vx * dt;
        en.y += en.vy * dt;

        const dx = en.x - state.player.x;
        const dy = en.y - state.player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < state.player.radius + 5) {
          endGame();
        }

        if (en.y > canvas.height + 50) state.enemies.splice(i, 1);
      });
    }

    function endGame() {
      state.running = false;
      state.gameOver = true;
      overlay.classList.remove("hidden");
      resultBox.style.display = "block";
      const finalScore = state.time.toFixed(1);
      finalScoreTxt.innerText = finalScore + "s";
      document.getElementById("title").innerText = "MISSION OVER";
      startBtn.innerText = "다시 시도";

      saveRank(finalScore);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 플레이어 (삼각형 비행체)
      ctx.fillStyle = varColor("--accent");
      ctx.shadowBlur = 15;
      ctx.shadowColor = varColor("--accent");
      ctx.beginPath();
      ctx.moveTo(state.player.x, state.player.y - 15);
      ctx.lineTo(state.player.x - 12, state.player.y + 12);
      ctx.lineTo(state.player.x + 12, state.player.y + 12);
      ctx.closePath();
      ctx.fill();

      // 미사일
      ctx.shadowBlur = 10;
      ctx.shadowColor = varColor("--danger");
      ctx.fillStyle = varColor("--danger");
      state.enemies.forEach(en => {
        ctx.fillRect(en.x - 2, en.y - 12, 4, 24);
      });
      ctx.shadowBlur = 0;
    }

    function varColor(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function loop(t) {
      if (!state.lastTime) state.lastTime = t;
      const dt = Math.min(0.1, (t - state.lastTime) / 1000);
      state.lastTime = t;

      update(dt);
      draw();
      if (state.running) requestAnimationFrame(loop);
    }

    // 컨트롤 이벤트
    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k === "arrowup" || k === "w") input.up = true;
      if (k === "arrowdown" || k === "s") input.down = true;
      if (k === "arrowleft" || k === "a") input.left = true;
      if (k === "arrowright" || k === "d") input.right = true;
      if (k === " ") toggleGame();
    });

    window.addEventListener("keyup", (e) => {
      const k = e.key.toLowerCase();
      if (k === "arrowup" || k === "w") input.up = false;
      if (k === "arrowdown" || k === "s") input.down = false;
      if (k === "arrowleft" || k === "a") input.left = false;
      if (k === "arrowright" || k === "d") input.right = false;
    });

    document.querySelectorAll("[data-hold]").forEach(btn => {
      const k = btn.dataset.hold;
      btn.onpointerdown = (e) => { e.preventDefault(); input[k] = true; };
      btn.onpointerup = btn.onpointercancel = btn.onpointerleave = () => { input[k] = false; };
    });

    startBtn.onclick = toggleGame;
    document.getElementById("mobileRestart").onclick = restart;

    draw();
  </script>
</body>
</html>
