<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>네온 타워 스택</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #bg-score {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            transition: opacity 0.3s;
        }

        .overlay h1 {
            font-size: 40px;
            margin: 0 0 10px 0;
            background: -webkit-linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .overlay p {
            font-size: 16px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 30px;
            color: #cbd5e1;
        }

        .overlay b {
            color: #fbbf24;
        }

        button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #ec4899, #f43f5e);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
            transition: transform 0.1s, filter 0.2s;
            margin-top: 10px;
        }

        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.2); }

        input {
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            width: 200px;
        }

        .floating-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: white;
            pointer-events: none;
            z-index: 5;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="bg-score">0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-screen" class="overlay">
        <h1>NEON TOWER</h1>
        <p>
            화면을 터치하여 블록을 쌓으세요.<br>
            어긋난 부분은 <b>잘려나갑니다.</b><br>
            정확히 일치시키면 <b>PERFECT 콤보!</b><br>
            <span style="font-size: 13px;">(5연속 퍼펙트 시 블록 사이즈 업)</span>
        </p>
        <button id="start-btn">타워 건설 시작</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display: none;">
        <h1 style="background: -webkit-linear-gradient(45deg, #f87171, #ef4444); -webkit-background-clip: text;">GAME OVER</h1>
        <p style="font-size: 24px; margin-bottom: 5px;">SCORE: <b id="final-score" style="font-size: 36px; color: white;">0</b></p>
        <p id="best-score-text" style="color: #4ade80; margin-top: 0; margin-bottom: 20px;">로컬 최고 기록: 0</p>
        
        <input type="text" id="player-name" placeholder="닉네임 (3자 이내)" maxlength="3">
        <button id="submit-btn">점수 등록 후 다시하기</button>
        <button id="restart-btn" style="background: #4b5563; font-size: 16px; padding: 10px 20px;">등록 안 하고 다시하기</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bgScore = document.getElementById('bg-score');
    const gameContainer = document.getElementById('game-container');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');

    const CANVAS_WIDTH = 500;
    const CANVAS_HEIGHT = 800;
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    // --- GAME ID 설정 (부모 창의 DB 저장용) ---
    const GAME_ID = "neon_tower"; 
    
    let state = 'MENU'; 
    let score = 0;
    let combo = 0;
    let bestScore = localStorage.getItem('neonTowerBest') || 0;
    
    const BLOCK_HEIGHT = 40;
    const MAX_WIDTH = 300;
    const PERFECT_TOLERANCE = 6;
    const INITIAL_SPEED = 5; // 초기 속도 상수 지정

    let blocks = []; 
    let movingBlock = null;
    let fallingBlocks = []; 
    let particles = [];     
    
    let hue = 200; 
    let currentSpeed = INITIAL_SPEED; // 게임 시작 시 초기화 됨
    let currentDir = 1;

    let cameraY = 0;
    let targetCameraY = 0;
    let flashAlpha = 0;

    // requestAnimationFrame 루프 ID 저장용 (중복 실행 방지)
    let animationId = null;

    gameContainer.addEventListener('mousedown', handleInput);
    gameContainer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput();
    }, {passive: false});

    document.getElementById('start-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        initGame();
    });
    
    document.getElementById('restart-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        initGame();
    });

    document.getElementById('submit-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        submitScoreAndRestart();
    });

    function initGame() {
        state = 'PLAYING';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        
        score = 0;
        combo = 0;
        hue = 200;
        
        // BUG FIX: 재시작 시 속도 초기화 (이전 게임의 가속된 속도가 남아있지 않게 함)
        currentSpeed = INITIAL_SPEED; 
        
        bgScore.innerText = score;
        
        blocks = [];
        fallingBlocks = [];
        particles = [];
        cameraY = 0;
        targetCameraY = 0;
        flashAlpha = 0;

        blocks.push({
            x: (CANVAS_WIDTH - MAX_WIDTH) / 2,
            y: CANVAS_HEIGHT - 100,
            w: MAX_WIDTH,
            h: BLOCK_HEIGHT * 5,
            color: `hsl(${hue}, 80%, 50%)`
        });

        spawnNextBlock();
        
        // BUG FIX: 기존 루프가 있다면 취소하고 새로 시작 (루프 중첩으로 빨라지는 현상 방지)
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function spawnNextBlock() {
        let topBlock = blocks[blocks.length - 1];
        
        hue = (hue + 12) % 360;
        currentDir *= -1;
        
        // 타워가 높아질수록(score 증가) 속도 증가
        if (currentSpeed < 12) {
            currentSpeed += 0.15; 
        }

        movingBlock = {
            x: currentDir === 1 ? -topBlock.w : CANVAS_WIDTH,
            y: topBlock.y - BLOCK_HEIGHT,
            w: topBlock.w,
            h: BLOCK_HEIGHT,
            speed: currentSpeed,
            dir: currentDir,
            color: `hsl(${hue}, 80%, 55%)`
        };

        targetCameraY = (CANVAS_HEIGHT - 400) - movingBlock.y;
    }

    function handleInput() {
        if (state !== 'PLAYING') return;

        let topBlock = blocks[blocks.length - 1];
        let current = movingBlock;

        current.speed = 0;

        let diff = current.x - topBlock.x;
        let absDiff = Math.abs(diff);

        if (absDiff >= current.w) {
            current.vy = 0;
            fallingBlocks.push(current);
            movingBlock = null;
            triggerGameOver();
            return;
        }

        if (absDiff <= PERFECT_TOLERANCE) {
            current.x = topBlock.x;
            combo++;
            score += 1 + Math.floor(combo / 3);
            
            flashAlpha = 0.5;
            spawnParticles(current.x + current.w/2, current.y + current.h/2, current.color);
            showFloatingText(`PERFECT! x${combo}`, current.x + current.w/2, current.y - 20, '#fff');

            if (combo % 5 === 0 && current.w < MAX_WIDTH) {
                let expandAmount = 20;
                current.w = Math.min(MAX_WIDTH, current.w + expandAmount);
                current.x -= expandAmount / 2;
                showFloatingText("SIZE UP!", current.x + current.w/2, current.y - 50, '#4ade80');
            }
        } else {
            combo = 0;
            score += 1;
            
            let chopped = {
                y: current.y,
                w: absDiff,
                h: current.h,
                color: current.color,
                vy: 0,
                vx: 0,
                angle: 0,
                va: (Math.random() - 0.5) * 0.1
            };

            if (diff > 0) {
                current.w -= absDiff;
                chopped.x = current.x + current.w;
                chopped.vx = 2;
            } else {
                current.w -= absDiff;
                current.x = topBlock.x;
                chopped.x = current.x - absDiff;
                chopped.vx = -2;
            }

            fallingBlocks.push(chopped);
        }

        blocks.push(current);
        bgScore.innerText = score;
        spawnNextBlock();
    }

    function triggerGameOver() {
        state = 'GAMEOVER';
        
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('neonTowerBest', bestScore);
        }
        
        document.getElementById('final-score').innerText = score;
        document.getElementById('best-score-text').innerText = `로컬 최고 기록: ${bestScore}`;
        
        setTimeout(() => {
            gameOverScreen.style.display = 'flex';
        }, 1000);
    }

    // --- DB 점수 전송 ---
    function submitScoreAndRestart() {
        let nameInput = document.getElementById('player-name').value.trim();
        let playerName = nameInput || '익명';

        // 부모 창의 window.db 객체에 접근 (iframe 환경일 때 동작)
        if (window.parent && window.parent.db && typeof window.parent.db.saveScore === 'function') {
            window.parent.db.saveScore(GAME_ID, {
                name: playerName,
                score: score,
                timestamp: Date.now()
            }).then(() => {
                initGame(); // 전송 성공 후 재시작
            }).catch(err => {
                alert("점수 등록에 실패했습니다.");
                console.error(err);
                initGame();
            });
        } else {
            // 로컬에서 그냥 띄웠을 때
            alert("DB 연결을 찾을 수 없습니다. (부모 창에서 실행해야 합니다)");
            initGame();
        }
    }


    // --- 효과 ---
    function spawnParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1,
                size: Math.random() * 4 + 2,
                color: color
            });
        }
    }

    function showFloatingText(text, x, y, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / CANVAS_WIDTH;
        const scaleY = rect.height / CANVAS_HEIGHT;
        
        el.style.left = `${(x * scaleX) + rect.left}px`;
        let drawY = y + cameraY;
        el.style.top = `${(drawY * scaleY) + rect.top}px`;
        el.style.color = color;
        
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    // --- 루프 ---
    function gameLoop() {
        update();
        draw();
        
        if (state !== 'MENU') {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    function update() {
        if (state === 'MENU') return;

        if (targetCameraY > cameraY) {
            cameraY += (targetCameraY - cameraY) * 0.1;
        }

        if (flashAlpha > 0) flashAlpha -= 0.02;

        if (state === 'PLAYING' && movingBlock) {
            movingBlock.x += movingBlock.speed * movingBlock.dir;
            
            if (movingBlock.x <= 0 || movingBlock.x + movingBlock.w >= CANVAS_WIDTH) {
                movingBlock.dir *= -1;
                if (movingBlock.x <= 0) movingBlock.x = 0;
                if (movingBlock.x + movingBlock.w >= CANVAS_WIDTH) movingBlock.x = CANVAS_WIDTH - movingBlock.w;
            }
        }

        for (let i = fallingBlocks.length - 1; i >= 0; i--) {
            let b = fallingBlocks[i];
            b.vy += 0.8; 
            b.y += b.vy;
            b.x += b.vx || 0;
            if(b.angle !== undefined) b.angle += b.va;
            
            if (b.y + cameraY > CANVAS_HEIGHT + 100) {
                fallingBlocks.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.03;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        blocks.forEach(b => drawNeonBlock(b.x, b.y + cameraY, b.w, b.h, b.color, false));

        if (movingBlock) {
            drawNeonBlock(movingBlock.x, movingBlock.y + cameraY, movingBlock.w, movingBlock.h, movingBlock.color, true);
        }

        fallingBlocks.forEach(b => {
            ctx.save();
            ctx.translate(b.x + b.w/2, b.y + cameraY + b.h/2);
            if(b.angle) ctx.rotate(b.angle);
            drawNeonBlock(-b.w/2, -b.h/2, b.w, b.h, b.color, false);
            ctx.restore();
        });

        particles.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y + cameraY, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }
    }

    function drawNeonBlock(x, y, w, h, color, isMoving) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.fillRect(x, y, w, h * 0.2);
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(x, y + h * 0.8, w, h * 0.2);

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, h);

        if (isMoving) {
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0; 
        }
    }

    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
</script>

</body>
</html>
