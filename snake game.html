<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뱀게임 - Arcade Hub</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.86);
      --panel-2: rgba(30, 41, 59, 0.9);
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.12), transparent 35%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.12), transparent 28%),
        linear-gradient(160deg, #020617, #111827 55%, #020617);
      padding: 20px;
    }

    .app { width: min(94vw, 820px); display: grid; gap: 16px; }

    .header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap; padding: 18px 20px; border: 1px solid var(--border);
      background: var(--panel); border-radius: 20px; box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .title-wrap { display: grid; gap: 6px; }
    .title { font-size: clamp(1.4rem, 2.4vw, 2rem); font-weight: 800; letter-spacing: -0.03em; margin: 0; }
    .subtitle { color: var(--muted); margin: 0; font-size: 0.95rem; }

    .stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { min-width: 106px; padding: 10px 12px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; }
    .stat-label { color: var(--muted); font-size: 0.8rem; margin-bottom: 4px; }
    .stat-value { font-size: 1.15rem; font-weight: 800; }

    .game-card { position: relative; border: 1px solid var(--border); border-radius: 24px; padding: 16px; background: var(--panel); box-shadow: var(--shadow); backdrop-filter: blur(12px); }
    .canvas-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1; background: linear-gradient(180deg, rgba(15, 23, 42, 0.85), rgba(2, 6, 23, 0.9)); border-radius: 18px; overflow: hidden; border: 1px solid rgba(148, 163, 184, 0.16); }
    canvas { width: 100%; height: 100%; display: block; }

    .overlay { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; padding: 20px; background: linear-gradient(180deg, rgba(2, 6, 23, 0.2), rgba(2, 6, 23, 0.65)); transition: opacity 0.18s ease; pointer-events: auto; }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay-card { width: min(90%, 360px); background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 20px; padding: 20px; box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35); pointer-events: auto; }

    button { border: 0; border-radius: 14px; background: var(--accent); color: white; font: inherit; font-weight: 700; padding: 12px 16px; cursor: pointer; transition: transform 0.12s ease, filter 0.12s ease; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.22); }
    button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .secondary { background: #334155; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18); }
    .danger { background: var(--danger); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.22); }

    .mobile-grid { display: grid; grid-template-columns: repeat(3, minmax(64px, 80px)); gap: 8px; justify-content: center; margin-top: 15px; }
    .mobile-grid button { background: #1e293b; min-height: 60px; font-size: 1.3rem; }
    .empty { visibility: hidden; }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="title-wrap">
        <h1 class="title">🐍 뱀게임</h1>
        <p class="subtitle">먹이를 먹고 길어지는 클래식 스네이크</p>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">점수</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">최고 기록</div>
          <div class="stat-value" id="bestScore">0</div>
        </div>
      </div>
    </section>

    <section class="game-card">
      <div class="canvas-wrap">
        <canvas id="game" width="480" height="480"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">게임 시작</h2>
            <p id="overlayText">방향키 또는 WASD로 움직이세요.</p>
            <div style="margin-top:20px;">
              <button id="startButton">시작하기</button>
            </div>
          </div>
        </div>
      </div>

      <div class="mobile-grid">
        <button class="empty"></button><button data-dir="up">▲</button><button class="empty"></button>
        <button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button>
      </div>

      <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
        <button id="pauseButton" class="secondary">일시정지</button>
        <button id="restartButton" class="danger">재시작</button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('bestScore');
    const overlayEl = document.getElementById('overlay');
    const overlayTitleEl = document.getElementById('overlayTitle');
    const overlayTextEl = document.getElementById('overlayText');
    const startButton = document.getElementById('startButton');

    const GRID_SIZE = 24;
    const TILE_COUNT = canvas.width / GRID_SIZE;
    
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 14, y: 10 };
    let score = 0;
    let running = false;
    let paused = false;
    let gameOver = false;
    let loopId = null;

    // --- [Firebase 랭킹 저장 함수] ---
    function saveScoreToFirebase(finalScore) {
        // 부모 창(index.html)의 db 객체 확인
        if (parent && parent.db) {
            const nick = prompt("🏆 새로운 기록! 닉네임을 입력하세요:", "익명");
            if (!nick) return;

            // 파일명 기반 컬렉션 ID 자동 생성
            const fileName = window.location.pathname.split('/').pop() || 'snake_game.html';
            const collectionId = "rankings_" + fileName.replace('.html', '').replace(/\s/g, '_').replace(/%20/g, '_');

            parent.db.collection(collectionId).add({
                name: nick,
                score: parseInt(finalScore),
                timestamp: new Date()
            }).then(() => {
                console.log("Score saved to Arcade Hub!");
            }).catch(err => console.error("Save error:", err));
        }
    }

    function resetState() {
      snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      placeFood();
      updateScoreboard();
      draw();
    }

    function placeFood() {
      food = { x: Math.floor(Math.random() * TILE_COUNT), y: Math.floor(Math.random() * TILE_COUNT) };
    }

    function updateScoreboard() {
      scoreEl.textContent = score;
    }

    function startGame() {
      if (gameOver) resetState();
      running = true; paused = false;
      overlayEl.classList.add('hidden');
      tick();
    }

    function tick() {
      if (!running || paused) return;

      direction = nextDirection;
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      // 충돌 체크
      if (head.x < 0 || head.y < 0 || head.x >= TILE_COUNT || head.y >= TILE_COUNT || 
          snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        updateScoreboard();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
      loopId = setTimeout(tick, Math.max(70, 150 - score * 3));
    }

    function draw() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 음식
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x * GRID_SIZE + 12, food.y * GRID_SIZE + 12, 8, 0, Math.PI * 2);
      ctx.fill();

      // 뱀
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#22c55e' : '#16a34a';
        ctx.fillRect(s.x * GRID_SIZE + 2, s.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
      });
    }

    function endGame() {
      running = false;
      gameOver = true;
      overlayTitleEl.textContent = "게임 오버";
      overlayTextEl.textContent = `최종 점수: ${score}점`;
      overlayEl.classList.remove('hidden');
      
      if (score > 0) saveScoreToFirebase(score);
    }

    // 컨트롤 및 이벤트
    window.addEventListener('keydown', e => {
      const keys = { ArrowUp: {x:0, y:-1}, ArrowDown: {x:0, y:1}, ArrowLeft: {x:-1, y:0}, ArrowRight: {x:1, y:0}, 
                     w: {x:0, y:-1}, s: {x:0, y:1}, a: {x:-1, y:0}, d: {x:1, y:0} };
      if (keys[e.key]) {
        const move = keys[e.key];
        if (move.x + direction.x !== 0 || move.y + direction.y !== 0) nextDirection = move;
      }
      if (e.key === ' ') { running ? (paused = !paused, paused || tick()) : startGame(); }
    });

    document.querySelectorAll('[data-dir]').forEach(btn => {
        btn.onclick = () => {
            const move = { up: {x:0, y:-1}, down: {x:0, y:1}, left: {x:-1, y:0}, right: {x:1, y:0} }[btn.dataset.dir];
            if (move.x + direction.x !== 0 || move.y + direction.y !== 0) nextDirection = move;
        };
    });

    startButton.onclick = startGame;
    document.getElementById('pauseButton').onclick = () => { paused = !paused; if(!paused) tick(); };
    document.getElementById('restartButton').onclick = () => { clearTimeout(loopId); running = false; resetState(); startGame(); };

    resetState();
  </script>
</body>
</html>
