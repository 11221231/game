<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>1945풍 전투기 미사일 피하기</title>
  <style>
    :root {
      --bg1: #07101f;
      --bg2: #162b4d;
      --panel: rgba(5, 10, 20, 0.78);
      --panel2: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.15);
      --text: #eef5ff;
      --muted: #aebbd1;
      --accent: #ffe16d;
      --danger: #ff6767;
      --good: #75f29c;
      --blue: #6fd7ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(111, 215, 255, 0.14), transparent 30%),
        radial-gradient(circle at 86% 6%, rgba(255, 225, 109, 0.12), transparent 25%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .wrap {
      width: min(100%, 980px);
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 4vw, 30px);
      letter-spacing: -0.04em;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      text-align: right;
    }

    .game-shell {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.28);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 900 / 700;
      touch-action: none;
      cursor: crosshair;
      background: #08111f;
    }

    .mobile-controls {
      display: none;
      grid-template-columns: 132px 1fr 132px;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 42px);
      grid-template-rows: repeat(3, 42px);
      gap: 3px;
      justify-content: center;
    }

    .dpad button:nth-child(1) { grid-column: 2; grid-row: 1; }
    .dpad button:nth-child(2) { grid-column: 1; grid-row: 2; }
    .dpad button:nth-child(3) { grid-column: 3; grid-row: 2; }
    .dpad button:nth-child(4) { grid-column: 2; grid-row: 3; }

    button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-weight: 800;
      font-size: 15px;
      min-height: 42px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      user-select: none;
    }

    button:active {
      transform: translateY(1px);
      background: rgba(255, 255, 255, 0.18);
    }

    .side-buttons {
      display: grid;
      gap: 8px;
    }

    .focus-btn {
      min-height: 91px;
      background: rgba(111, 215, 255, 0.14);
      color: #dff7ff;
    }

    .start-btn {
      background: rgba(255, 225, 109, 0.14);
      color: #fff2b6;
    }

    .description {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .kbd {
      display: inline-block;
      padding: 1px 7px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-bottom-width: 2px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .hint {
        text-align: left;
      }

      .mobile-controls {
        display: grid;
      }

      .description {
        font-size: 13px;
      }
    }

    @media (max-width: 430px) {
      .mobile-controls {
        grid-template-columns: 126px 1fr 112px;
        gap: 7px;
        padding: 9px;
      }

      .dpad {
        grid-template-columns: repeat(3, 39px);
        grid-template-rows: repeat(3, 39px);
      }

      button {
        min-height: 39px;
      }

      .focus-btn {
        min-height: 84px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="topbar">
      <h1>1945풍 전투기 미사일 피하기</h1>
      <div class="hint">
        전투기 5종류 선택 · 자동 사격<br />
        둥근 탄막을 피하면서 적기를 격추하세요.
      </div>
    </section>

    <section class="game-shell">
      <canvas id="game" width="900" height="700" aria-label="1945풍 전투기 미사일 피하기 게임"></canvas>
    </section>

    <section class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="dpad">
        <button data-hold="up">▲</button>
        <button data-hold="left">◀</button>
        <button data-hold="right">▶</button>
        <button data-hold="down">▼</button>
      </div>
      <button class="focus-btn" data-hold="focus">FOCUS<br />저속</button>
      <div class="side-buttons">
        <button class="start-btn" id="mobileStart">시작/정지</button>
        <button id="mobileBomb">폭탄</button>
        <button id="mobileRestart">다시 시작</button>
      </div>
    </section>

    <section class="description">
      조작법:
      <span class="kbd">1~5</span> 전투기 선택,
      <span class="kbd">Enter</span>/<span class="kbd">Space</span> 시작·일시정지,
      <span class="kbd">방향키</span>/<span class="kbd">WASD</span> 이동,
      <span class="kbd">Shift</span> 저속 이동/피격점 표시,
      <span class="kbd">Z</span> 폭탄,
      <span class="kbd">R</span> 다시 시작.
      사격은 1945처럼 자동으로 나갑니다.
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const W = canvas.width;
      const H = canvas.height;
      const TAU = Math.PI * 2;

      const state = {
        mode: "menu",
        selected: 2,
        score: 0,
        best: Number(localStorage.getItem("fighter1945Best") || 0),
        lives: 3,
        bombs: 2,
        shield: 0,
        invincible: 0,
        frame: 0,
        lastTime: 0,
        enemyTimer: 0,
        bulletTimer: 0,
        pickupTimer: 0,
        message: "전투기를 고르고 Enter를 누르세요.",
        shake: 0,
        scroll: 0
      };

      const input = {
        up: false,
        down: false,
        left: false,
        right: false,
        focus: false
      };

      const fighters = [
        {
          name: "1. 라이트닝",
          desc: "빠른 기동형",
          speed: 360,
          focusSpeed: 178,
          hit: 5,
          lives: 2,
          bombs: 3,
          fireRate: 0.11,
          color: "#69d7ff",
          dark: "#275f85",
          accent: "#ffffff",
          style: "lightning"
        },
        {
          name: "2. 머스탱",
          desc: "밸런스형",
          speed: 315,
          focusSpeed: 158,
          hit: 6,
          lives: 3,
          bombs: 2,
          fireRate: 0.13,
          color: "#dce7f2",
          dark: "#607184",
          accent: "#5dd7ff",
          style: "mustang"
        },
        {
          name: "3. 코르세어",
          desc: "화력형",
          speed: 286,
          focusSpeed: 142,
          hit: 7,
          lives: 4,
          bombs: 2,
          fireRate: 0.105,
          color: "#406aff",
          dark: "#15245d",
          accent: "#ffe16d",
          style: "corsair"
        },
        {
          name: "4. 제로",
          desc: "작은 피격점",
          speed: 338,
          focusSpeed: 170,
          hit: 4,
          lives: 2,
          bombs: 3,
          fireRate: 0.125,
          color: "#8eea8f",
          dark: "#2f7945",
          accent: "#ff5c5c",
          style: "zero"
        },
        {
          name: "5. 스핏파이어",
          desc: "부드러운 조작",
          speed: 326,
          focusSpeed: 162,
          hit: 5,
          lives: 3,
          bombs: 2,
          fireRate: 0.12,
          color: "#ff9b68",
          dark: "#8d3f2c",
          accent: "#9ce6ff",
          style: "spitfire"
        }
      ];

      const player = {
        x: W / 2,
        y: H - 86,
        shotTimer: 0
      };

      const enemies = [];
      const enemyBullets = [];
      const playerBullets = [];
      const pickups = [];
      const particles = [];

      const clouds = Array.from({ length: 26 }, (_, i) => ({
        x: (i * 173 + 41) % W,
        y: (i * 251 + 80) % H,
        s: 0.7 + (i % 6) * 0.16,
        a: 0.06 + (i % 4) * 0.02
      }));

      const waterLines = Array.from({ length: 50 }, (_, i) => ({
        x: (i * 97) % W,
        y: (i * 59) % H,
        len: 30 + (i % 5) * 18
      }));

      function fighter() {
        return fighters[state.selected];
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function dist(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function saveBest() {
        if (Math.floor(state.score) > state.best) {
          state.best = Math.floor(state.score);
          localStorage.setItem("fighter1945Best", String(state.best));
        }
      }

      function chooseFighter(index) {
        state.selected = index;
        state.message = `${fighters[index].name} 선택됨. Enter로 출격!`;
      }

      function startGame() {
        const f = fighter();

        player.x = W / 2;
        player.y = H - 82;
        player.shotTimer = 0;

        enemies.length = 0;
        enemyBullets.length = 0;
        playerBullets.length = 0;
        pickups.length = 0;
        particles.length = 0;

        state.mode = "running";
        state.score = 0;
        state.lives = f.lives;
        state.bombs = f.bombs;
        state.shield = 2.0;
        state.invincible = 2.0;
        state.frame = 0;
        state.enemyTimer = 0;
        state.bulletTimer = 0;
        state.pickupTimer = 0;
        state.message = "";
        state.shake = 0;

        Object.keys(input).forEach((key) => input[key] = false);
      }

      function toggleStartPause() {
        if (state.mode === "menu" || state.mode === "gameover") {
          startGame();
        } else if (state.mode === "running") {
          state.mode = "paused";
          state.message = "일시정지";
        } else if (state.mode === "paused") {
          state.mode = "running";
          state.message = "";
        }
      }

      function restart() {
        if (state.mode === "menu") {
          state.message = "전투기를 고르고 Enter를 누르세요.";
        } else {
          startGame();
        }
      }

      function useBomb() {
        if (state.mode !== "running" || state.bombs <= 0) return;

        state.bombs--;
        state.invincible = Math.max(state.invincible, 1.5);
        state.shake = 18;
        state.message = "폭탄! 화면의 탄막을 지웠습니다.";

        for (const b of enemyBullets) {
          explosion(b.x, b.y, "#ffe16d", 5, 110);
        }
        enemyBullets.length = 0;

        for (const e of enemies) {
          e.hp -= 4;
          explosion(e.x, e.y, "#ffffff", 10, 160);
        }
      }

      function update(dt) {
        state.scroll += dt * 82;
        state.frame++;
        state.shake = Math.max(0, state.shake - dt * 50);

        updateParticles(dt);

        if (state.mode !== "running") return;

        state.score += dt * 6;
        saveBest();

        updatePlayer(dt);
        spawnEnemies(dt);
        spawnPickups(dt);
        updatePlayerBullets(dt);
        updateEnemies(dt);
        updateEnemyBullets(dt);
        updatePickups(dt);

        state.shield = Math.max(0, state.shield - dt);
        state.invincible = Math.max(0, state.invincible - dt);
      }

      function updatePlayer(dt) {
        const f = fighter();

        let dx = 0;
        let dy = 0;
        if (input.left) dx -= 1;
        if (input.right) dx += 1;
        if (input.up) dy -= 1;
        if (input.down) dy += 1;

        if (dx !== 0 || dy !== 0) {
          const len = Math.hypot(dx, dy);
          dx /= len;
          dy /= len;
        }

        const speed = input.focus ? f.focusSpeed : f.speed;
        player.x = clamp(player.x + dx * speed * dt, 34, W - 34);
        player.y = clamp(player.y + dy * speed * dt, 112, H - 42);

        player.shotTimer += dt;
        if (player.shotTimer >= f.fireRate) {
          player.shotTimer = 0;
          firePlayerShot(f);
        }
      }

      function firePlayerShot(f) {
        // 주포
        playerBullets.push({ x: player.x - 7, y: player.y - 42, vx: 0, vy: -660, r: 4, power: 1 });
        playerBullets.push({ x: player.x + 7, y: player.y - 42, vx: 0, vy: -660, r: 4, power: 1 });

        // 화력형은 보조탄
        if (f.style === "corsair") {
          playerBullets.push({ x: player.x - 30, y: player.y - 26, vx: -70, vy: -600, r: 3, power: 1 });
          playerBullets.push({ x: player.x + 30, y: player.y - 26, vx: 70, vy: -600, r: 3, power: 1 });
        } else if (f.style === "lightning") {
          playerBullets.push({ x: player.x, y: player.y - 48, vx: 0, vy: -720, r: 4, power: 1 });
        }
      }

      function spawnEnemies(dt) {
        const difficulty = Math.min(12, Math.floor(state.score / 140));
        const interval = Math.max(0.42, 1.18 - difficulty * 0.055);

        state.enemyTimer += dt;
        if (state.enemyTimer < interval) return;
        state.enemyTimer = 0;

        const kindRoll = Math.random();
        let kind = "small";
        if (state.score > 280 && kindRoll < 0.22) kind = "bomber";
        else if (state.score > 180 && kindRoll < 0.46) kind = "sweeper";

        const x = rand(70, W - 70);
        const enemy = {
          x,
          y: -60,
          vx: 0,
          vy: 72 + difficulty * 5,
          hp: kind === "bomber" ? 6 : kind === "sweeper" ? 3 : 2,
          maxHp: kind === "bomber" ? 6 : kind === "sweeper" ? 3 : 2,
          kind,
          age: 0,
          fire: rand(0.25, 0.85),
          wobble: rand(0, TAU)
        };

        if (kind === "sweeper") {
          enemy.vx = Math.random() < 0.5 ? -90 : 90;
          enemy.x = enemy.vx > 0 ? 50 : W - 50;
          enemy.y = rand(-120, -40);
        }

        enemies.push(enemy);
      }

      function spawnPickups(dt) {
        state.pickupTimer += dt;
        if (state.pickupTimer < 10.5) return;
        state.pickupTimer = 0;

        if (pickups.length >= 2) return;

        const roll = Math.random();
        pickups.push({
          x: rand(80, W - 80),
          y: -30,
          vy: 78,
          kind: roll < 0.52 ? "shield" : roll < 0.82 ? "heart" : "bomb",
          age: 0
        });
      }

      function updatePlayerBullets(dt) {
        for (let i = playerBullets.length - 1; i >= 0; i--) {
          const b = playerBullets[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;

          if (b.y < -40 || b.x < -40 || b.x > W + 40) {
            playerBullets.splice(i, 1);
            continue;
          }

          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            const radius = e.kind === "bomber" ? 34 : 24;
            if (dist(b.x, b.y, e.x, e.y) < radius + b.r) {
              e.hp -= b.power;
              spark(b.x, b.y, "#ffffff", 4);
              playerBullets.splice(i, 1);

              if (e.hp <= 0) {
                destroyEnemy(j);
              }
              break;
            }
          }
        }
      }

      function destroyEnemy(index) {
        const e = enemies[index];
        const gain = e.kind === "bomber" ? 90 : e.kind === "sweeper" ? 55 : 35;
        state.score += gain;
        explosion(e.x, e.y, e.kind === "bomber" ? "#ffb65c" : "#8fdcff", 22, 210);
        enemies.splice(index, 1);
      }

      function updateEnemies(dt) {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          e.age += dt;

          if (e.kind === "small") {
            e.x += Math.sin(e.age * 2.6 + e.wobble) * 32 * dt;
          } else if (e.kind === "bomber") {
            e.x += Math.sin(e.age * 1.4 + e.wobble) * 45 * dt;
          } else if (e.kind === "sweeper") {
            e.x += e.vx * dt;
          }

          e.y += e.vy * dt;

          e.fire -= dt;
          if (e.fire <= 0 && e.y > 70 && e.y < H - 120) {
            fireEnemy(e);
            const difficulty = Math.min(12, Math.floor(state.score / 140));
            e.fire = e.kind === "bomber"
              ? rand(0.65, 1.05)
              : rand(0.75, 1.22) - difficulty * 0.018;
          }

          const collisionRadius = e.kind === "bomber" ? 33 : 24;
          if (dist(player.x, player.y, e.x, e.y) < collisionRadius + fighter().hit) {
            enemies.splice(i, 1);
            hitPlayer(e.x, e.y);
            continue;
          }

          if (e.y > H + 80 || e.x < -120 || e.x > W + 120) {
            enemies.splice(i, 1);
          }
        }
      }

      function fireEnemy(e) {
        const angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
        const speedBase = e.kind === "bomber" ? 178 : 205;

        if (e.kind === "bomber") {
          for (let k = -2; k <= 2; k++) {
            const a = angleToPlayer + k * 0.2;
            enemyBullets.push(makeEnemyBullet(e.x, e.y + 20, a, speedBase, 8, "orange"));
          }
        } else if (e.kind === "sweeper") {
          for (let k = -1; k <= 1; k++) {
            const a = Math.PI / 2 + k * 0.28;
            enemyBullets.push(makeEnemyBullet(e.x, e.y + 18, a, speedBase + 20, 7, "red"));
          }
        } else {
          enemyBullets.push(makeEnemyBullet(e.x, e.y + 18, angleToPlayer, speedBase, 7, "red"));
        }
      }

      function makeEnemyBullet(x, y, angle, speed, radius, color) {
        return {
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: radius,
          color,
          age: 0
        };
      }

      function updateEnemyBullets(dt) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          b.age += dt;
          b.x += b.vx * dt;
          b.y += b.vy * dt;

          if (b.x < -60 || b.x > W + 60 || b.y < -80 || b.y > H + 80) {
            enemyBullets.splice(i, 1);
            continue;
          }

          if (dist(player.x, player.y, b.x, b.y) < fighter().hit + b.r) {
            enemyBullets.splice(i, 1);
            hitPlayer(b.x, b.y);
          }
        }
      }

      function hitPlayer(x, y) {
        explosion(x, y, "#ff6767", 18, 180);

        if (state.invincible > 0) return;

        if (state.shield > 0) {
          state.shield = 0;
          state.invincible = 1.2;
          state.message = "방어막이 탄막을 막았습니다!";
          return;
        }

        state.lives--;
        state.invincible = 1.7;
        state.shake = 14;
        state.message = `피격! 남은 목숨: ${state.lives}`;

        if (state.lives <= 0) {
          state.mode = "gameover";
          state.message = "격추! R 또는 Enter로 다시 출격";
          explosion(player.x, player.y, "#ff6767", 50, 260);
          saveBest();
        }
      }

      function updatePickups(dt) {
        for (let i = pickups.length - 1; i >= 0; i--) {
          const p = pickups[i];
          p.age += dt;
          p.y += p.vy * dt;
          p.x += Math.sin(p.age * 2) * 20 * dt;

          if (p.y > H + 40) {
            pickups.splice(i, 1);
            continue;
          }

          if (dist(player.x, player.y, p.x, p.y) < 26) {
            if (p.kind === "shield") {
              state.shield = Math.max(state.shield, 6);
              state.message = "방어막 획득!";
              spark(p.x, p.y, "#6fd7ff", 18);
            } else if (p.kind === "heart") {
              state.lives = Math.min(state.lives + 1, fighter().lives + 2);
              state.message = "목숨 +1!";
              spark(p.x, p.y, "#ff6e95", 18);
            } else {
              state.bombs = Math.min(state.bombs + 1, fighter().bombs + 2);
              state.message = "폭탄 +1!";
              spark(p.x, p.y, "#ffe16d", 18);
            }
            pickups.splice(i, 1);
          }
        }
      }

      function makeParticle(x, y, vx, vy, life, color, radius) {
        return { x, y, vx, vy, life, maxLife: life, color, radius };
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt;
          p.radius *= Math.pow(0.18, dt);
          if (p.life <= 0 || p.radius < 0.2) {
            particles.splice(i, 1);
          }
        }
      }

      function explosion(x, y, color, count, power) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, TAU);
          const s = rand(power * 0.28, power);
          particles.push(makeParticle(
            x,
            y,
            Math.cos(a) * s,
            Math.sin(a) * s,
            rand(0.32, 0.95),
            color,
            rand(3, 9)
          ));
        }
      }

      function spark(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, TAU);
          const s = rand(60, 170);
          particles.push(makeParticle(
            x,
            y,
            Math.cos(a) * s,
            Math.sin(a) * s,
            rand(0.25, 0.65),
            color,
            rand(2, 5)
          ));
        }
      }

      function draw() {
        ctx.save();

        if (state.shake > 0) {
          ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
        }

        drawBackground();

        if (state.mode === "menu") {
          drawMenu();
          ctx.restore();
          return;
        }

        drawHud();
        drawPickups();
        drawPlayerBullets();
        drawEnemies();
        drawEnemyBullets();
        drawParticles();
        drawPlayer();

        if (state.mode === "paused") {
          drawOverlay("일시정지", "Space 또는 Enter로 계속하기");
        } else if (state.mode === "gameover") {
          drawOverlay("격추됨", `점수 ${Math.floor(state.score)}점 · R 또는 Enter로 다시 출격`);
        }

        ctx.restore();
      }

      function drawBackground() {
        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, "#0a1830");
        g.addColorStop(0.45, "#153a64");
        g.addColorStop(1, "#0f273f");
        ctx.fillStyle = g;
        ctx.fillRect(-30, -30, W + 60, H + 60);

        // 바다/활주로 느낌의 스크롤 라인
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 2;
        for (const line of waterLines) {
          let y = (line.y + state.scroll * 1.15) % H;
          ctx.beginPath();
          ctx.moveTo(line.x, y);
          ctx.lineTo(line.x + line.len, y + 8);
          ctx.stroke();
        }
        ctx.restore();

        // 구름
        ctx.save();
        for (const c of clouds) {
          const y = (c.y + state.scroll * 0.38) % (H + 120) - 60;
          ctx.fillStyle = `rgba(255,255,255,${c.a})`;
          drawCloud(c.x, y, c.s);
        }
        ctx.restore();

        // 중앙 진행 가이드 라인
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.045)";
        ctx.lineWidth = 1;
        for (let y = -40; y < H + 40; y += 46) {
          const yy = (y + state.scroll) % (H + 80) - 40;
          ctx.beginPath();
          ctx.moveTo(W * 0.5 - 130, yy);
          ctx.lineTo(W * 0.5 + 130, yy);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawCloud(x, y, s) {
        ctx.beginPath();
        ctx.arc(x, y, 28 * s, 0, TAU);
        ctx.arc(x + 25 * s, y + 8 * s, 24 * s, 0, TAU);
        ctx.arc(x - 28 * s, y + 12 * s, 20 * s, 0, TAU);
        ctx.arc(x + 2 * s, y + 18 * s, 25 * s, 0, TAU);
        ctx.fill();
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function centerText(text, y, size = 18, weight = 400, color = "#eef5ff") {
        ctx.save();
        ctx.font = `${weight} ${size}px system-ui, -apple-system, Segoe UI, sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, W / 2, y);
        ctx.restore();
      }

      function drawMenu() {
        centerText("1945풍 전투기 미사일 피하기", 78, 42, 900);
        centerText("전투기 5종류 중 하나를 골라 둥근 탄막을 피하고 적기를 격추하세요.", 118, 18, 400, "#cbd7eb");
        centerText(state.message, 158, 18, 800, "#ffe16d");

        const cardW = 158;
        const cardH = 178;
        const gap = 14;
        const total = fighters.length * cardW + (fighters.length - 1) * gap;
        const startX = (W - total) / 2;
        const y = 224;

        for (let i = 0; i < fighters.length; i++) {
          drawFighterCard(fighters[i], startX + i * (cardW + gap), y, cardW, cardH, i === state.selected);
        }

        centerText("조작: 방향키/WASD 이동 · Shift 저속/피격점 · Z 폭탄 · Space/Enter 시작/일시정지", 474, 16, 500, "#d8e3f7");
        centerText("사격은 자동 · 숫자 1~5 또는 카드 클릭으로 전투기 선택", 505, 14, 400, "#aebbd1");
        centerText(`최고점수: ${Math.floor(state.best)}`, 538, 17, 800, "#ffffff");

        drawMiniInstructions();
      }

      function drawMiniInstructions() {
        ctx.save();
        roundRect(225, 570, 450, 70, 20);
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();

        ctx.fillStyle = "#cbd7eb";
        ctx.font = "400 13px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("전투기 모양은 캔버스 벡터로 직접 그린 1940년대 종스크롤 슈팅 스타일입니다.", W / 2, 598);
        ctx.fillText("빨간/주황색 동그란 탄막은 피하고, 파란 아군 탄으로 적기를 맞히세요.", W / 2, 622);
        ctx.restore();
      }

      function drawFighterCard(f, x, y, w, h, selected) {
        ctx.save();
        roundRect(x, y, w, h, 22);
        ctx.fillStyle = selected ? "rgba(255,255,255,0.16)" : "rgba(255,255,255,0.08)";
        ctx.fill();
        ctx.lineWidth = selected ? 3 : 1.5;
        ctx.strokeStyle = selected ? "#ffe16d" : "rgba(255,255,255,0.18)";
        ctx.stroke();

        ctx.translate(x + w / 2, y + 66);
        drawFighterSprite(f, 1.35, 0, false);
        ctx.restore();

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#f5f8ff";
        ctx.font = "800 15px system-ui, sans-serif";
        ctx.fillText(f.name, x + w / 2, y + 120);
        ctx.fillStyle = "#cbd7eb";
        ctx.font = "400 12px system-ui, sans-serif";
        ctx.fillText(f.desc, x + w / 2, y + 143);
        ctx.fillStyle = "#aebbd1";
        ctx.font = "400 11px system-ui, sans-serif";
        ctx.fillText(`속도 ${Math.round(f.speed)} · 목숨 ${f.lives} · 폭탄 ${f.bombs}`, x + w / 2, y + 162);
        ctx.restore();
      }

      function drawHud() {
        ctx.save();
        roundRect(18, 14, W - 36, 68, 18);
        ctx.fillStyle = "rgba(3, 7, 14, 0.76)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        ctx.fillStyle = "#f2f7ff";
        ctx.font = "800 18px system-ui, sans-serif";
        ctx.fillText(fighter().name.replace(/^\d\.\s*/, ""), 35, 41);

        ctx.font = "500 15px system-ui, sans-serif";
        ctx.fillText(`점수: ${Math.floor(state.score)}`, 160, 41);
        ctx.fillText(`최고: ${Math.floor(state.best)}`, 265, 41);

        ctx.fillText("목숨:", 365, 41);
        for (let i = 0; i < state.lives; i++) {
          ctx.fillStyle = "#ff6e95";
          drawHeart(416 + i * 21, 36, 0.46);
        }

        ctx.fillStyle = "#ffe16d";
        ctx.fillText(`폭탄: ${state.bombs}`, 505, 41);

        ctx.fillStyle = state.shield > 0 ? "#6fd7ff" : "#aebbd1";
        ctx.fillText(state.shield > 0 ? "방어막 ON" : "방어막 없음", 595, 41);

        ctx.fillStyle = "#aebbd1";
        ctx.font = "400 12px system-ui, sans-serif";
        const msg = state.message || "둥근 탄막을 피하세요. Shift를 누르면 느려지고 피격점이 보입니다.";
        ctx.fillText(msg, 35, 65);
        ctx.restore();
      }

      function drawPlayerBullets() {
        ctx.save();
        for (const b of playerBullets) {
          const g = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, 10);
          g.addColorStop(0, "#ffffff");
          g.addColorStop(0.45, "#80ecff");
          g.addColorStop(1, "rgba(128, 236, 255, 0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(b.x, b.y, 10, 0, TAU);
          ctx.fill();

          ctx.fillStyle = "#eaffff";
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, TAU);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawEnemies() {
        for (const e of enemies) {
          ctx.save();
          ctx.translate(e.x, e.y);
          ctx.rotate(Math.PI); // 적기는 아래쪽을 향함

          if (e.kind === "bomber") {
            drawEnemyBomber(1.18);
          } else if (e.kind === "sweeper") {
            drawEnemyFighter(0.98, "#ffb65c", "#79331f");
          } else {
            drawEnemyFighter(0.9, "#ff7f7f", "#7e2730");
          }

          ctx.restore();

          // 체력바
          if (e.maxHp > 2) {
            ctx.save();
            ctx.fillStyle = "rgba(0,0,0,0.35)";
            ctx.fillRect(e.x - 24, e.y - 36, 48, 5);
            ctx.fillStyle = "#ffdc60";
            ctx.fillRect(e.x - 24, e.y - 36, 48 * clamp(e.hp / e.maxHp, 0, 1), 5);
            ctx.restore();
          }
        }
      }

      function drawEnemyFighter(scale, main, dark) {
        ctx.save();
        ctx.scale(scale, scale);

        // 날개
        ctx.fillStyle = dark;
        path([[-7, -5], [-55, 8], [-12, 19]]);
        ctx.fill();
        path([[7, -5], [55, 8], [12, 19]]);
        ctx.fill();

        // 꼬리날개
        path([[-5, 25], [-28, 41], [-8, 37]]);
        ctx.fill();
        path([[5, 25], [28, 41], [8, 37]]);
        ctx.fill();

        // 동체
        const body = ctx.createLinearGradient(0, -34, 0, 44);
        body.addColorStop(0, "#ffd0d0");
        body.addColorStop(0.42, main);
        body.addColorStop(1, dark);
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(0, -38);
        ctx.bezierCurveTo(13, -18, 14, 20, 5, 44);
        ctx.lineTo(-5, 44);
        ctx.bezierCurveTo(-14, 20, -13, -18, 0, -38);
        ctx.closePath();
        ctx.fill();

        // 캐노피
        ctx.fillStyle = "rgba(80, 20, 20, 0.55)";
        ctx.beginPath();
        ctx.ellipse(0, -9, 7, 13, 0, 0, TAU);
        ctx.fill();

        // 프로펠러
        drawPropeller(0, -39, 0.72, "rgba(255,255,255,0.50)");
        ctx.restore();
      }

      function drawEnemyBomber(scale) {
        ctx.save();
        ctx.scale(scale, scale);

        ctx.fillStyle = "#6e2e24";
        path([[-12, -4], [-70, 12], [-18, 24]]);
        ctx.fill();
        path([[12, -4], [70, 12], [18, 24]]);
        ctx.fill();

        ctx.fillStyle = "#a84d32";
        path([[-8, 34], [-36, 52], [-10, 48]]);
        ctx.fill();
        path([[8, 34], [36, 52], [10, 48]]);
        ctx.fill();

        const body = ctx.createLinearGradient(0, -42, 0, 55);
        body.addColorStop(0, "#ffc48b");
        body.addColorStop(0.5, "#d96d3f");
        body.addColorStop(1, "#5f241e");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(0, -45);
        ctx.bezierCurveTo(18, -20, 18, 30, 6, 58);
        ctx.lineTo(-6, 58);
        ctx.bezierCurveTo(-18, 30, -18, -20, 0, -45);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(80,30,20,0.55)";
        ctx.beginPath();
        ctx.ellipse(0, -10, 8, 16, 0, 0, TAU);
        ctx.fill();

        drawPropeller(0, -46, 0.9, "rgba(255,255,255,0.48)");
        ctx.restore();
      }

      function drawEnemyBullets() {
        for (const b of enemyBullets) {
          ctx.save();

          const colorA = b.color === "orange" ? "#ffb547" : "#ff5c6c";
          const colorB = b.color === "orange" ? "rgba(255, 181, 71, 0)" : "rgba(255, 92, 108, 0)";

          const g = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, b.r + 10);
          g.addColorStop(0, "#ffffff");
          g.addColorStop(0.35, colorA);
          g.addColorStop(1, colorB);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r + 9, 0, TAU);
          ctx.fill();

          ctx.fillStyle = colorA;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, TAU);
          ctx.fill();

          ctx.fillStyle = "rgba(255,255,255,0.65)";
          ctx.beginPath();
          ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.35, b.r * 0.32, 0, TAU);
          ctx.fill();

          ctx.restore();
        }
      }

      function drawPickups() {
        for (const p of pickups) {
          const pulse = Math.sin(p.age * 8) * 3;
          const r = 16 + pulse;

          ctx.save();
          if (p.kind === "shield") {
            ctx.fillStyle = "rgba(111, 215, 255, 0.16)";
            ctx.beginPath();
            ctx.arc(p.x, p.y, r + 8, 0, TAU);
            ctx.fill();
            ctx.strokeStyle = "#6fd7ff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, TAU);
            ctx.stroke();
            ctx.fillStyle = "#dff7ff";
            ctx.font = "900 14px system-ui, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("S", p.x, p.y);
          } else if (p.kind === "heart") {
            ctx.fillStyle = "rgba(255, 110, 149, 0.18)";
            ctx.beginPath();
            ctx.arc(p.x, p.y, r + 8, 0, TAU);
            ctx.fill();
            ctx.fillStyle = "#ff6e95";
            drawHeart(p.x, p.y, 0.88);
          } else {
            ctx.fillStyle = "rgba(255, 225, 109, 0.18)";
            ctx.beginPath();
            ctx.arc(p.x, p.y, r + 8, 0, TAU);
            ctx.fill();
            ctx.fillStyle = "#ffe16d";
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - 16);
            ctx.lineTo(p.x + 15, p.y);
            ctx.lineTo(p.x, p.y + 16);
            ctx.lineTo(p.x - 15, p.y);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#4c3500";
            ctx.font = "900 12px system-ui, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("B", p.x, p.y);
          }
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.save();
          ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPlayer() {
        if (state.invincible > 0 && Math.floor(state.invincible * 18) % 2 === 0) return;

        ctx.save();
        ctx.translate(player.x, player.y);

        if (state.shield > 0) {
          const sr = 34;
          ctx.fillStyle = "rgba(111, 215, 255, 0.17)";
          ctx.beginPath();
          ctx.arc(0, 0, sr, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = "rgba(111, 215, 255, 0.82)";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(0, 0, sr, 0, TAU);
          ctx.stroke();
        }

        drawFighterSprite(fighter(), 1.05, state.frame * 0.34, true);
        ctx.restore();

        // 피격점 표시
        if (input.focus || state.mode === "gameover") {
          ctx.save();
          ctx.fillStyle = "#ff3355";
          ctx.strokeStyle = "rgba(255,255,255,0.85)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(player.x, player.y, fighter().hit, 0, TAU);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawFighterSprite(f, scale, propAngle, exhaust) {
        ctx.save();
        ctx.scale(scale, scale);

        if (exhaust) {
          const g = ctx.createLinearGradient(0, 30, 0, 62);
          g.addColorStop(0, "rgba(255, 225, 109, 0.8)");
          g.addColorStop(1, "rgba(255, 90, 40, 0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(-7, 30);
          ctx.lineTo(0, 62 + Math.sin(state.frame * 0.4) * 5);
          ctx.lineTo(7, 30);
          ctx.closePath();
          ctx.fill();
        }

        if (f.style === "lightning") {
          drawLightningFighter(f, propAngle);
        } else if (f.style === "mustang") {
          drawMustangFighter(f, propAngle);
        } else if (f.style === "corsair") {
          drawCorsairFighter(f, propAngle);
        } else if (f.style === "zero") {
          drawZeroFighter(f, propAngle);
        } else {
          drawSpitfireFighter(f, propAngle);
        }

        ctx.restore();
      }

      function drawLightningFighter(f, propAngle) {
        // 쌍동체 느낌
        ctx.fillStyle = f.dark;
        path([[-12, -10], [-60, 4], [-16, 15]]);
        ctx.fill();
        path([[12, -10], [60, 4], [16, 15]]);
        ctx.fill();

        ctx.fillStyle = f.color;
        roundMiniRect(-24, -21, 13, 54, 7);
        ctx.fill();
        roundMiniRect(11, -21, 13, 54, 7);
        ctx.fill();

        ctx.fillStyle = f.dark;
        path([[-19, 29], [-38, 43], [-18, 39]]);
        ctx.fill();
        path([[19, 29], [38, 43], [18, 39]]);
        ctx.fill();

        drawBody(f, 0, -40, 0, 45, 12, 7);
        drawCanopy(0, -15, f.accent);
        drawPropeller(-17.5, -23, 0.58, "rgba(255,255,255,0.62)", propAngle);
        drawPropeller(17.5, -23, 0.58, "rgba(255,255,255,0.62)", -propAngle);
        drawRivets();
      }

      function drawMustangFighter(f, propAngle) {
        ctx.fillStyle = f.dark;
        path([[-7, -7], [-64, 4], [-13, 18]]);
        ctx.fill();
        path([[7, -7], [64, 4], [13, 18]]);
        ctx.fill();

        ctx.fillStyle = f.color;
        path([[-6, 25], [-34, 46], [-9, 39]]);
        ctx.fill();
        path([[6, 25], [34, 46], [9, 39]]);
        ctx.fill();

        drawBody(f, 0, -44, 0, 50, 13, 6);
        drawCanopy(0, -16, "#7ddcff");
        drawPropeller(0, -46, 0.9, "rgba(255,255,255,0.58)", propAngle);
        drawNoseStripe(f.accent);
        drawRivets();
      }

      function drawCorsairFighter(f, propAngle) {
        // 굽은 갈매기 날개 느낌
        ctx.fillStyle = f.dark;
        path([[-8, -7], [-35, 0], [-72, 17], [-20, 20], [-8, 9]]);
        ctx.fill();
        path([[8, -7], [35, 0], [72, 17], [20, 20], [8, 9]]);
        ctx.fill();

        ctx.fillStyle = f.color;
        path([[-6, 28], [-36, 48], [-9, 42]]);
        ctx.fill();
        path([[6, 28], [36, 48], [9, 42]]);
        ctx.fill();

        drawBody(f, 0, -45, 0, 52, 15, 8);
        drawCanopy(0, -12, "#b7eaff");
        drawPropeller(0, -48, 1.02, "rgba(255,255,255,0.58)", propAngle);
        drawWingRoundel(-42, 12, f.accent);
        drawWingRoundel(42, 12, f.accent);
        drawRivets();
      }

      function drawZeroFighter(f, propAngle) {
        // 넓고 둥근 날개
        ctx.fillStyle = f.dark;
        ctx.beginPath();
        ctx.moveTo(-8, -6);
        ctx.bezierCurveTo(-30, -1, -58, 4, -66, 14);
        ctx.bezierCurveTo(-52, 22, -22, 19, -9, 11);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(8, -6);
        ctx.bezierCurveTo(30, -1, 58, 4, 66, 14);
        ctx.bezierCurveTo(52, 22, 22, 19, 9, 11);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = f.color;
        path([[-6, 26], [-31, 44], [-9, 39]]);
        ctx.fill();
        path([[6, 26], [31, 44], [9, 39]]);
        ctx.fill();

        drawBody(f, 0, -42, 0, 49, 12, 7);
        drawCanopy(0, -14, "#d8fff0");
        drawPropeller(0, -44, 0.86, "rgba(255,255,255,0.60)", propAngle);
        drawWingRoundel(-43, 12, f.accent);
        drawWingRoundel(43, 12, f.accent);
        drawRivets();
      }

      function drawSpitfireFighter(f, propAngle) {
        // 타원형 주익
        ctx.fillStyle = f.dark;
        ctx.beginPath();
        ctx.moveTo(-7, -8);
        ctx.bezierCurveTo(-30, -14, -70, 0, -74, 16);
        ctx.bezierCurveTo(-52, 24, -21, 19, -8, 9);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(7, -8);
        ctx.bezierCurveTo(30, -14, 70, 0, 74, 16);
        ctx.bezierCurveTo(52, 24, 21, 19, 8, 9);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = f.color;
        path([[-6, 28], [-33, 47], [-8, 41]]);
        ctx.fill();
        path([[6, 28], [33, 47], [8, 41]]);
        ctx.fill();

        drawBody(f, 0, -44, 0, 51, 13, 6);
        drawCanopy(0, -13, f.accent);
        drawPropeller(0, -46, 0.92, "rgba(255,255,255,0.58)", propAngle);
        drawWingRoundel(-46, 13, f.accent);
        drawWingRoundel(46, 13, f.accent);
        drawRivets();
      }

      function drawBody(f, noseX, noseY, tailX, tailY, width, tailWidth) {
        const body = ctx.createLinearGradient(0, noseY, 0, tailY);
        body.addColorStop(0, "#ffffff");
        body.addColorStop(0.16, f.color);
        body.addColorStop(0.62, f.color);
        body.addColorStop(1, f.dark);

        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(noseX, noseY);
        ctx.bezierCurveTo(width, noseY + 12, width + 3, tailY - 12, tailWidth, tailY);
        ctx.lineTo(-tailWidth, tailY);
        ctx.bezierCurveTo(-width - 3, tailY - 12, -width, noseY + 12, noseX, noseY);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, noseY + 7);
        ctx.lineTo(0, tailY - 2);
        ctx.stroke();
      }

      function drawCanopy(x, y, color) {
        const g = ctx.createLinearGradient(x, y - 14, x, y + 13);
        g.addColorStop(0, "rgba(255,255,255,0.75)");
        g.addColorStop(0.45, color);
        g.addColorStop(1, "rgba(20,40,70,0.75)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(x, y, 7, 15, 0, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.42)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(x, y, 7, 15, 0, 0, TAU);
        ctx.stroke();
      }

      function drawPropeller(x, y, scale, color, angle = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.scale(scale, scale);

        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-20, 0);
        ctx.lineTo(20, 0);
        ctx.moveTo(0, -20);
        ctx.lineTo(0, 20);
        ctx.stroke();

        ctx.fillStyle = "rgba(20,30,45,0.85)";
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      function drawWingRoundel(x, y, color) {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.82)";
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, TAU);
        ctx.fill();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      function drawNoseStripe(color) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-8, -31);
        ctx.lineTo(8, -31);
        ctx.stroke();
        ctx.restore();
      }

      function drawRivets() {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.28)";
        for (let y = -2; y <= 31; y += 10) {
          ctx.beginPath();
          ctx.arc(-5, y, 1.1, 0, TAU);
          ctx.arc(5, y, 1.1, 0, TAU);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawHeart(x, y, scale) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.beginPath();
        ctx.moveTo(0, 11);
        ctx.bezierCurveTo(-22, -5, -10, -22, 0, -9);
        ctx.bezierCurveTo(10, -22, 22, -5, 0, 11);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawOverlay(title, subtitle) {
        ctx.save();
        roundRect(245, 242, 410, 185, 28);
        ctx.fillStyle = "rgba(0, 0, 0, 0.72)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.stroke();

        centerText(title, 316, 40, 900);
        centerText(subtitle, 360, 18, 400, "#dce7fa");
        centerText("방향키/WASD 이동 · Shift 저속 · Z 폭탄", 394, 14, 400, "#aebbd1");
        ctx.restore();
      }

      function path(points) {
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.closePath();
      }

      function roundMiniRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function getCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const clientX = event.clientX ?? (event.touches && event.touches[0].clientX) ?? 0;
        const clientY = event.clientY ?? (event.touches && event.touches[0].clientY) ?? 0;
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height)
        };
      }

      function clickMenu(x, y) {
        if (state.mode !== "menu") return false;

        const cardW = 158;
        const cardH = 178;
        const gap = 14;
        const total = fighters.length * cardW + (fighters.length - 1) * gap;
        const startX = (W - total) / 2;
        const cardY = 224;

        for (let i = 0; i < fighters.length; i++) {
          const x0 = startX + i * (cardW + gap);
          if (x >= x0 && x <= x0 + cardW && y >= cardY && y <= cardY + cardH) {
            chooseFighter(i);
            return true;
          }
        }
        return false;
      }

      canvas.addEventListener("pointerdown", (event) => {
        const p = getCanvasPoint(event);
        if (!clickMenu(p.x, p.y) && state.mode === "gameover") {
          startGame();
        }
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d"].includes(key)) {
          event.preventDefault();
        }

        if (key === "arrowup" || key === "w") input.up = true;
        if (key === "arrowdown" || key === "s") input.down = true;
        if (key === "arrowleft" || key === "a") input.left = true;
        if (key === "arrowright" || key === "d") input.right = true;
        if (key === "shift") input.focus = true;

        if (key >= "1" && key <= "5") chooseFighter(Number(key) - 1);
        if (key === " " || key === "enter") toggleStartPause();
        if (key === "r") restart();
        if (key === "z") useBomb();
        if (key === "escape") {
          state.mode = "menu";
          state.message = "전투기를 고르고 Enter를 누르세요.";
        }
      }, { passive: false });

      window.addEventListener("keyup", (event) => {
        const key = event.key.toLowerCase();
        if (key === "arrowup" || key === "w") input.up = false;
        if (key === "arrowdown" || key === "s") input.down = false;
        if (key === "arrowleft" || key === "a") input.left = false;
        if (key === "arrowright" || key === "d") input.right = false;
        if (key === "shift") input.focus = false;
      });

      function setHoldButton(button, key) {
        const on = (event) => {
          event.preventDefault();
          input[key] = true;
        };
        const off = (event) => {
          event.preventDefault();
          input[key] = false;
        };

        button.addEventListener("pointerdown", on);
        button.addEventListener("pointerup", off);
        button.addEventListener("pointercancel", off);
        button.addEventListener("pointerleave", off);
      }

      document.querySelectorAll("[data-hold]").forEach((button) => {
        setHoldButton(button, button.dataset.hold);
      });

      document.getElementById("mobileStart").addEventListener("click", toggleStartPause);
      document.getElementById("mobileRestart").addEventListener("click", restart);
      document.getElementById("mobileBomb").addEventListener("click", useBomb);

      function loop(time) {
        if (!state.lastTime) state.lastTime = time;
        const dt = Math.min(0.033, (time - state.lastTime) / 1000);
        state.lastTime = time;

        update(dt);
        draw();

        requestAnimationFrame(loop);
      }

      draw();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
