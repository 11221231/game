<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>1945풍 전투기 미사일 피하기</title>
  <style>
    :root {
      --bg1: #07101f;
      --bg2: #162b4d;
      --panel: rgba(5, 10, 20, 0.78);
      --panel2: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.15);
      --text: #eef5ff;
      --muted: #aebbd1;
      --accent: #ffe16d;
      --danger: #ff6767;
      --good: #75f29c;
      --blue: #6fd7ff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; min-height: 100%; margin: 0;
      background: radial-gradient(circle at 18% 12%, rgba(111, 215, 255, 0.14), transparent 30%),
                  radial-gradient(circle at 82% 88%, rgba(255, 225, 109, 0.08), transparent 30%),
                  var(--bg1);
      color: var(--text);
      font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
      overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    #gameContainer {
      position: relative; width: min(100vw, 480px); height: min(100vh, 800px);
      background: #000; overflow: hidden; box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
    }

    canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

    /* UI Overlay */
    .overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px); z-index: 10; padding: 20px; text-align: center;
    }

    .overlay.hidden { display: none; }

    .score-view {
      position: absolute; top: 20px; left: 0; right: 0; display: flex;
      justify-content: space-around; pointer-events: none; z-index: 5;
    }

    .score-item { background: var(--panel); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--line); }
    .score-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .score-val { font-size: 18px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }

    button {
      background: var(--accent); color: #000; border: none; padding: 14px 28px;
      border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    button:active { transform: scale(0.95); }

    .mobile-ctrl {
      position: absolute; bottom: 20px; left: 0; right: 0; display: grid;
      grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; pointer-events: none;
    }
    .ctrl-btn {
      pointer-events: auto; background: var(--panel2); border: 1px solid var(--line);
      height: 60px; border-radius: 15px; color: var(--text); display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div id="gameContainer">
    <div class="score-view">
      <div class="score-item">
        <div class="score-label">SCORE</div>
        <div id="scoreVal" class="score-val">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">BOMBS</div>
        <div id="bombVal" class="score-val">3</div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay" class="overlay">
      <h1 id="statusTitle" style="color: var(--accent); margin:0;">STRIKER 1945</h1>
      <p id="statusMsg" style="color: var(--muted); margin: 15px 0 25px;">미사일을 피하고 끝까지 생존하세요!</p>
      <div id="resultArea" style="display:none; margin-bottom: 25px;">
        <div style="font-size:14px; color:var(--muted)">최종 스코어</div>
        <div id="finalScore" style="font-size:48px; font-weight:900; color:var(--accent)">0</div>
      </div>
      <button id="mainBtn">작전 개시</button>
    </div>

    <div class="mobile-ctrl">
      <div class="ctrl-btn" data-hold="left">◀</div>
      <div class="ctrl-btn" data-hold="up">▲</div>
      <div class="ctrl-btn" data-hold="right">▶</div>
      <div id="mobileBomb" class="ctrl-btn" style="background: var(--danger)">BOMB</div>
      <div class="ctrl-btn" data-hold="down">▼</div>
      <div id="mobileRestart" class="ctrl-btn">RETRY</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreVal = document.getElementById("scoreVal");
    const bombVal = document.getElementById("bombVal");
    const overlay = document.getElementById("overlay");
    const mainBtn = document.getElementById("mainBtn");
    const resultArea = document.getElementById("resultArea");
    const finalScoreTxt = document.getElementById("finalScore");

    canvas.width = 480;
    canvas.height = 800;

    const state = {
      running: false,
      gameOver: false,
      score: 0,
      bombs: 3,
      lastTime: 0,
      player: { x: 240, y: 700, w: 40, h: 40, speed: 300 },
      bullets: [],
      enemies: [],
      explosions: []
    };

    const input = { up: false, down: false, left: false, right: false, focus: false };

    // --- [Firebase 랭킹 저장 로직] ---
    function saveRank(finalScore) {
      if (finalScore < 50) return; // 일정 점수 이상만 기록

      if (parent && parent.db) {
        setTimeout(() => {
          const playerName = prompt(`${finalScore}점 기록! 랭킹에 등록할 이름을 입력하세요:`, "파일럿");
          if (playerName) {
            const fileName = window.location.pathname.split('/').pop() || 'fighter_game';
            const collectionId = "rankings_" + fileName.replace('.html', '').replace(/\s/g, '_').replace(/%20/g, '_');

            parent.db.collection(collectionId).add({
              name: playerName,
              score: parseInt(finalScore),
              timestamp: new Date()
            }).then(() => {
              alert("기록이 전송되었습니다!");
            }).catch(e => console.error("Firebase Error:", e));
          }
        }, 500);
      }
    }

    function toggleStartPause() {
      if (state.gameOver) {
        restart();
      } else {
        state.running = !state.running;
        overlay.classList.toggle("hidden", state.running);
        if (state.running) requestAnimationFrame(loop);
      }
    }

    function restart() {
      state.score = 0;
      state.bombs = 3;
      state.gameOver = false;
      state.player.x = 240;
      state.player.y = 700;
      state.enemies = [];
      state.bullets = [];
      state.running = true;
      scoreVal.innerText = "0";
      bombVal.innerText = "3";
      overlay.classList.add("hidden");
      resultArea.style.display = "none";
      requestAnimationFrame(loop);
    }

    function useBomb() {
      if (!state.running || state.gameOver || state.bombs <= 0) return;
      state.bombs--;
      bombVal.innerText = state.bombs;
      state.enemies = []; // 화면 내 모든 미사일 제거
    }

    function update(dt) {
      if (!state.running || state.gameOver) return;

      // 이동
      let speed = state.player.speed * dt;
      if (input.up) state.player.y -= speed;
      if (input.down) state.player.y += speed;
      if (input.left) state.player.x -= speed;
      if (input.right) state.player.x += speed;

      // 경계 제한
      state.player.x = Math.max(20, Math.min(canvas.width - 20, state.player.x));
      state.player.y = Math.max(20, Math.min(canvas.height - 20, state.player.y));

      // 미사일 스폰
      if (Math.random() < 0.05 + (state.score * 0.001)) {
        state.enemies.push({
          x: Math.random() * canvas.width,
          y: -20,
          speed: 200 + Math.random() * 300 + (state.score * 2)
        });
      }

      // 미사일 업데이트 및 충돌 체크
      state.enemies.forEach((en, i) => {
        en.y += en.speed * dt;
        
        // 충돌 판정
        const dx = en.x - state.player.x;
        const dy = en.y - state.player.y;
        if (Math.sqrt(dx*dx + dy*dy) < 20) {
          endGame();
        }

        if (en.y > canvas.height) {
          state.enemies.splice(i, 1);
          state.score += 10;
          scoreVal.innerText = state.score;
        }
      });
    }

    function endGame() {
      state.running = false;
      state.gameOver = true;
      overlay.classList.remove("hidden");
      resultArea.style.display = "block";
      finalScoreTxt.innerText = state.score;
      document.getElementById("statusTitle").innerText = "MISSION FAILED";
      mainBtn.innerText = "재도전";
      
      saveRank(state.score);
    }

    function draw() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 플레이어 (전투기 형상)
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(state.player.x, state.player.y - 20);
      ctx.lineTo(state.player.x - 15, state.player.y + 15);
      ctx.lineTo(state.player.x + 15, state.player.y + 15);
      ctx.fill();

      // 미사일
      ctx.fillStyle = "#ff6767";
      state.enemies.forEach(en => {
        ctx.fillRect(en.x - 2, en.y - 10, 4, 20);
      });
    }

    function loop(time) {
      if (!state.lastTime) state.lastTime = time;
      const dt = Math.min(0.1, (time - state.lastTime) / 1000);
      state.lastTime = time;

      update(dt);
      draw();

      if (state.running) requestAnimationFrame(loop);
    }

    // Controls
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "arrowup" || key === "w") input.up = true;
      if (key === "arrowdown" || key === "s") input.down = true;
      if (key === "arrowleft" || key === "a") input.left = true;
      if (key === "arrowright" || key === "d") input.right = true;
      if (key === "b") useBomb();
      if (key === " ") toggleStartPause();
    });

    window.addEventListener("keyup", (e) => {
      const key = e.key.toLowerCase();
      if (key === "arrowup" || key === "w") input.up = false;
      if (key === "arrowdown" || key === "s") input.down = false;
      if (key === "arrowleft" || key === "a") input.left = false;
      if (key === "arrowright" || key === "d") input.right = false;
    });

    mainBtn.onclick = toggleStartPause;
    document.getElementById("mobileRestart").onclick = restart;
    document.getElementById("mobileBomb").onclick = useBomb;

    document.querySelectorAll("[data-hold]").forEach(btn => {
      const key = btn.dataset.hold;
      btn.onpointerdown = (e) => { e.preventDefault(); input[key] = true; };
      btn.onpointerup = btn.onpointercancel = btn.onpointerleave = () => { input[key] = false; };
    });

    draw();
  </script>
</body>
</html>
