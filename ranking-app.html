<style>
    :root {
        --bg2: rgba(255, 255, 255, 0.8);
        --accent: #0071E3;
        --radius: 18px;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", sans-serif;
    }
    #ranking-container {
        font-family: var(--sans);
        background: var(--bg2);
        backdrop-filter: saturate(180%) blur(20px);
        border-radius: var(--radius);
        padding: 24px;
        max-width: 320px;
        margin: 20px auto;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        border: 1px solid rgba(0,0,0,0.1);
    }
    .rank-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .rank-row:last-child { border: none; }
    input {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        margin-top: 8px;
        cursor: pointer;
        font-weight: 600;
    }
</style>

<div id="ranking-container">
    <h3 style="margin-top:0">🏆 실시간 랭킹</h3>
    <div id="rank-list">불러오는 중...</div>
    <input type="text" id="nickname" placeholder="닉네임 입력">
    <button onclick="saveScore()">기록 등록하기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, limit, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ✅ 여기에 본인의 Firebase 설정값을 붙여넣으세요.
    const firebaseConfig = {
        apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
        authDomain: "game-c2924.firebaseapp.com",
        projectId: "game-c2924",
        storageBucket: "game-c2924.firebasestorage.app",
        messagingSenderId: "423929694317",
        appId: "1:423929694317:web:e995dcf1ad70f146629764"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // [자동화 핵심] 현재 폴더명을 게임 식별자로 사용 (예: /game/flappy -> 'flappy')
    const gameId = window.location.pathname.split('/').filter(Boolean).pop() || "main_game";

    // 실시간 랭킹 리스너 (자동 업데이트)
    const q = query(
        collection(db, "rankings"),
        where("gameId", "==", gameId),
        orderBy("score", "desc"),
        limit(5)
    );

    onSnapshot(q, (snapshot) => {
        const listDiv = document.getElementById('rank-list');
        listDiv.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            listDiv.innerHTML += `
                <div class="rank-row">
                    <span>${data.nickname}</span>
                    <strong style="color:var(--accent)">${data.score.toLocaleString()}</strong>
                </div>`;
        });
    });

    // 점수 저장 함수 (window에 바인딩하여 버튼에서 사용 가능하게 함)
    window.saveScore = async () => {
        const nick = document.getElementById('nickname').value;
        const score = window.currentScore || 0; // 게임 코드에서 window.currentScore를 갱신하도록 설정하세요.

        if (!nick) return alert("닉네임을 입력해주세요!");

        try {
            await addDoc(collection(db, "rankings"), {
                gameId: gameId,
                nickname: nick,
                score: Number(score),
                timestamp: new Date()
            });
            alert("랭킹에 등록되었습니다!");
        } catch (e) {
            console.error("Error adding document: ", e);
        }
    };
</script>
