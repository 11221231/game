<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Game Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            /* Apple-inspired Design Tokens */
            --bg: #F5F5F7;
            --sidebar-bg: #1D1D1F;
            --accent: #0071E3;
            --text-main: #F5F5F7;
            --text-dim: #86868B;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --header-height: 60px;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); overflow: hidden; 
        }

        .container { display: flex; height: 100vh; }

        /* Sidebar Design */
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); color: var(--text-main); 
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        .brand { 
            padding: 35px 25px; font-size: 1.4rem; font-weight: 700; 
            letter-spacing: -0.5px; color: #fff;
        }

        .nav-menu { flex: 1; overflow-y: auto; padding: 10px 15px; }
        
        .nav-item { 
            padding: 12px 15px; cursor: pointer; color: var(--text-dim); 
            border-radius: var(--radius); margin-bottom: 4px; transition: all 0.2s;
            display: flex; align-items: center;
        }

        .nav-item:hover { background: var(--glass); color: #fff; }
        .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

        /* Ranking Section */
        #ranking-container { 
            margin: 15px; padding: 20px; border-radius: var(--radius);
            background: var(--glass); border: 1px solid var(--border);
        }

        #ranking-container h3 { 
            font-size: 13px; color: var(--text-dim); margin: 0 0 15px 0; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .rank-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; font-size: 14px;
        }

        .rank-number { color: var(--accent); font-weight: bold; width: 25px; }
        .rank-name { flex: 1; color: var(--text-main); }
        .rank-score { font-family: "SF Mono", monospace; color: #FF9F0A; font-weight: 600; }

        .main-content { flex: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { 
                display: flex; height: var(--header-height); background: var(--sidebar-bg); 
                align-items: center; padding: 0 20px; justify-content: space-between; color: white;
            }
        }
    </style>
</head>
<body>

    <header class="mobile-header" style="display: none;">
        <div style="font-weight: bold;">Arcade Hub</div>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
    </header>

    <div class="container">
        <nav class="sidebar" id="sidebar">
            <div class="brand">Arcade Hub</div>
            <div class="nav-menu" id="dynamicMenu">
                <div style="text-align:center; padding:20px; color:var(--text-dim);">Loading Games...</div>
            </div>
            <div id="ranking-container">
                <h3>🏆 Real-time Ranking</h3>
                <div id="rank-list">
                    <div style="font-size:12px; color:var(--text-dim);">Select a game</div>
                </div>
            </div>
        </nav>
        <main class="main-content">
            <iframe id="contentFrame" src=""></iframe>
        </main>
    </div>

    <script>
        const USERNAME = "11221231";
        const REPO = "game";
        
        // 1. Firebase Config Applied
        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            authDomain: "game-c2924.firebaseapp.com",
            databaseURL: "https://game-c2924-default-rtdb.firebaseio.com",
            projectId: "game-c2924",
            storageBucket: "game-c2924.firebasestorage.app",
            messagingSenderId: "423929694317",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let unsubscribeRank = null;

        // 2. Load GitHub Files (HTML Games)
        async function loadFileList() {
            const menuContainer = document.getElementById('dynamicMenu');
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const files = await response.json();
                
                // index.html 제외하고 html 파일만 필터링
                const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                menuContainer.innerHTML = ''; 
                htmlFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    const displayName = file.name.replace('.html', '').replace(/_/g, ' ').toUpperCase();
                    
                    div.className = `nav-item ${index === 0 ? 'active' : ''}`;
                    div.innerHTML = `<span>${displayName}</span>`;
                    div.onclick = () => changePage(div, file.name);
                    menuContainer.appendChild(div);

                    if (index === 0) {
                        document.getElementById('contentFrame').src = file.name;
                        loadRankings(file.name); 
                    }
                });
            } catch (err) {
                menuContainer.innerHTML = '<div style="color:#ff3b30; padding:20px;">Failed to load repo.</div>';
            }
        }

        // 3. Real-time Ranking Logic
        function loadRankings(gameName) {
            const rankList = document.getElementById('rank-list');
            rankList.innerHTML = '<div style="font-size:12px; color:var(--text-dim);">Loading...</div>';

            if (unsubscribeRank) unsubscribeRank();

            // 파일명 기반 컬렉션 ID 자동 생성 (예: 'game1.html' -> 'rankings_game1')
            let collectionId = "rankings_" + gameName.replace('.html', '').replace(/\s/g, '_');
            
            // 예외 처리 (기존 강화하기 게임 등 특정 ID 유지 필요 시)
            if (gameName.includes('forge')) collectionId = "rankings_forge";

            unsubscribeRank = db.collection(collectionId)
                .orderBy("score", "desc")
                .limit(5)
                .onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        rankList.innerHTML = '<div style="font-size:12px; color:var(--text-dim);">No records yet.</div>';
                        return;
                    }
                    let html = "";
                    let rank = 1;
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const unit = gameName.includes('forge') ? 'Lv' : 'pts';
                        html += `
                            <div class="rank-row">
                                <span class="rank-number">${rank++}</span>
                                <span class="rank-name">${data.name || 'Anonymous'}</span>
                                <span class="rank-score">${data.score}${unit}</span>
                            </div>`;
                    });
                    rankList.innerHTML = html;
                }, (err) => {
                    console.error(err);
                    rankList.innerHTML = '<div style="font-size:12px; color:#ff3b30;">Database Error</div>';
                });
        }

        function changePage(el, url) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('contentFrame').src = url;
            loadRankings(url);
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        loadFileList();
    </script>
</body>
</html>
