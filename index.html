<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flash Game Archive</title>
  <style>
    /* 기존 스타일 유지 */
    :root {
      --bg: #F5F5F7;
      --bg2: rgba(255, 255, 255, 0.75);
      --bg3: rgba(255, 255, 255, 0.95);
      --border: rgba(0, 0, 0, 0.08);
      --text: #1D1D1F;
      --text2: #515154;
      --accent: #0071E3;
      --radius: 18px;
      --sidebar-width: 280px;
      --header-height: 60px;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Text", "Pretendard", sans-serif;
    }

    [data-theme="dark"], @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --bg2: rgba(28, 28, 30, 0.65);
        --bg3: rgba(44, 44, 46, 0.85);
        --border: rgba(255, 255, 255, 0.1);
        --text: #F5F5F7;
        --text2: #EBEBF5;
        --accent: #0A84FF;
      }
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; 
      font-family: var(--sans); 
      background: var(--bg); 
      color: var(--text);
      overflow: hidden; 
    }

    .container { display: flex; height: 100vh; }

    .sidebar { 
      width: var(--sidebar-width); 
      background: var(--bg2); 
      backdrop-filter: saturate(180%) blur(20px);
      border-right: 1px solid var(--border);
      display: flex; 
      flex-direction: column; 
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      z-index: 1000; 
    }

    .brand { padding: 30px 25px; font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px;}
    .nav-menu { flex: 1; overflow-y: auto; padding: 10px 15px; }
    .nav-item { padding: 12px 15px; margin-bottom: 4px; cursor: pointer; color: var(--text2); border-radius: 10px; transition: 0.2s; font-size: 0.95rem;}
    .nav-item:hover { background: var(--border); color: var(--text); }
    .nav-item.active { background: var(--accent); color: white; font-weight: 500;}

    .main-content { flex: 1; position: relative; padding: 20px; background: var(--bg); }
    .iframe-wrapper { width: 100%; height: 100%; background: white; border-radius: var(--radius); box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04); overflow: hidden; border: 1px solid var(--border); position: relative; }
    iframe { width: 100%; height: 100%; border: none; }

    /* 랭킹 시스템 Floating UI 추가 */
    #ranking-overlay {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 260px;
      background: var(--bg3);
      backdrop-filter: saturate(180%) blur(20px);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      border: 1px solid var(--border);
      z-index: 2000;
      font-size: 0.9rem;
    }

    .rank-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .rank-row:last-child { border: none; }
    .rank-input-group { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
    input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
    .btn-save { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; }

    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      #ranking-overlay { width: calc(100% - 40px); left: 20px; top: 80px; }
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 80px 15px 20px 15px; }
    }
  </style>
</head>
<body>

<header class="mobile-header" style="display:none;">
  <div style="font-weight: bold; color: var(--accent);">Flash Game</div>
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="container">
  <nav class="sidebar" id="sidebar">
    <div class="brand">Games</div>
    <div class="nav-menu" id="dynamicMenu">
      <div class="loading">불러오는 중...</div>
    </div>
  </nav>

  <main class="main-content">
    <div class="iframe-wrapper">
      <iframe id="contentFrame" src=""></iframe>
      
      <div id="ranking-overlay">
        <h4 style="margin: 0 0 15px 0;">🏆 <span id="current-game-title">Game</span> 랭킹</h4>
        <div id="rank-list">데이터를 불러오는 중...</div>
        <div class="rank-input-group">
          <input type="text" id="nickname" placeholder="닉네임 입력">
          <button class="btn-save" onclick="saveScore()">기록 등록</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, orderBy, limit, onSnapshot } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
    authDomain: "game-c2924.firebaseapp.com",
    projectId: "game-c2924",
    storageBucket: "game-c2924.firebasestorage.app",
    messagingSenderId: "423929694317",
    appId: "1:423929694317:web:e995dcf1ad70f146629764"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let currentUnsubscribe = null;

  // 랭킹 불러오기 함수
  window.updateRankingUI = (gameId) => {
    document.getElementById('current-game-title').innerText = gameId;
    if (currentUnsubscribe) currentUnsubscribe();

    const q = query(
      collection(db, "rankings"),
      where("gameId", "==", gameId),
      orderBy("score", "desc"),
      limit(5)
    );

    currentUnsubscribe = onSnapshot(q, (snapshot) => {
      const listDiv = document.getElementById('rank-list');
      listDiv.innerHTML = "";
      if (snapshot.empty) {
        listDiv.innerHTML = "<div style='color:var(--text3)'>첫 기록을 남겨보세요!</div>";
        return;
      }
      snapshot.forEach((doc) => {
        const data = doc.data();
        listDiv.innerHTML += `
          <div class="rank-row">
            <span>${data.nickname}</span>
            <strong style="color:var(--accent)">${data.score.toLocaleString()}</strong>
          </div>`;
      });
    });
  };

  // 점수 저장 함수
  window.saveScore = async () => {
    const nick = document.getElementById('nickname').value;
    const iframe = document.getElementById('contentFrame');
    const gameId = iframe.src.split('/').pop().replace('.html', '');
    
    // iframe 내부의 변수나 메인 윈도우의 전역 변수에서 점수를 가져옴
    const score = window.currentScore || (iframe.contentWindow && iframe.contentWindow.currentScore) || 0;

    if (!nick) return alert("닉네임을 입력해주세요!");
    if (score <= 0) return alert("등록할 점수가 없습니다!");

    try {
      await addDoc(collection(db, "rankings"), {
        gameId: gameId,
        nickname: nick,
        score: Number(score),
        timestamp: new Date()
      });
      alert("등록 완료!");
      document.getElementById('nickname').value = "";
    } catch (e) {
      console.error(e);
      alert("등록 실패: Firestore 규칙을 확인하세요.");
    }
  };
</script>
