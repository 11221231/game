<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flash Game Archive</title>
  <style>
    /* 사용자 정의 Apple 디자인 시스템 */
    :root {
      --bg: #F5F5F7;
      --bg2: rgba(255, 255, 255, 0.75);
      --bg3: rgba(255, 255, 255, 0.95);
      --border: rgba(0, 0, 0, 0.08);
      --text: #1D1D1F;
      --text2: #515154;
      --accent: #0071E3;
      --radius: 18px;
      --sidebar-width: 280px;
      --header-height: 60px;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Text", "Pretendard", sans-serif;
    }

    [data-theme="dark"], @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --bg2: rgba(28, 28, 30, 0.65);
        --bg3: rgba(44, 44, 46, 0.85);
        --border: rgba(255, 255, 255, 0.1);
        --text: #F5F5F7;
        --text2: #EBEBF5;
        --accent: #0A84FF;
      }
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; 
      font-family: var(--sans); 
      background: var(--bg); 
      color: var(--text);
      overflow: hidden; 
    }

    .container { display: flex; height: 100vh; }

    /* 사이드바 스타일 */
    .sidebar { 
      width: var(--sidebar-width); 
      background: var(--bg2); 
      backdrop-filter: saturate(180%) blur(20px);
      border-right: 1px solid var(--border);
      display: flex; 
      flex-direction: column; 
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      z-index: 1000; 
    }

    .brand { 
      padding: 30px 25px; 
      font-size: 1.4rem; 
      font-weight: 700; 
      color: var(--accent); 
      letter-spacing: -0.5px;
    }
    
    .nav-menu { flex: 1; overflow-y: auto; padding: 10px 15px; }
    
    .nav-item { 
      padding: 12px 15px; 
      margin-bottom: 4px;
      cursor: pointer; 
      color: var(--text2); 
      border-radius: 10px;
      transition: 0.2s;
      font-size: 0.95rem;
    }

    .nav-item:hover { background: var(--border); color: var(--text); }
    .nav-item.active { 
      background: var(--accent); 
      color: white; 
      font-weight: 500;
    }

    /* 메인 콘텐츠 영역 */
    .main-content { 
      flex: 1; 
      position: relative; 
      padding: 20px;
      background: var(--bg);
    }

    .iframe-wrapper {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    iframe { width: 100%; height: 100%; border: none; }

    /* 모바일 대응 */
    .mobile-header { 
      display: none; 
      height: var(--header-height); 
      background: var(--bg3); 
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      align-items: center; 
      padding: 0 20px; 
      position: fixed; top: 0; left: 0; right: 0; 
      z-index: 100; justify-content: space-between; 
    }

    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 80px 15px 20px 15px; }
      .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 999; }
      .overlay.show { display: block; }
    }

    .menu-toggle { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }
    .loading { padding: 20px; font-size: 0.9rem; color: var(--text3); text-align: center; }
  </style>
</head>
<body>

<header class="mobile-header">
  <div style="font-weight: bold; color: var(--accent);">Flash Game</div>
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="container">
  <nav class="sidebar" id="sidebar">
    <div class="brand">Games</div>
    <div class="nav-menu" id="dynamicMenu">
      <div class="loading">불러오는 중...</div>
    </div>
  </nav>

  <main class="main-content">
    <div class="iframe-wrapper">
      <iframe id="contentFrame" src=""></iframe>
    </div>
  </main>
</div>

<script>
  const USERNAME = "11221231";
  const REPO = "game";

  async function loadFileList() {
    const menuContainer = document.getElementById('dynamicMenu');
    try {
      const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
      if (!response.ok) throw new Error('API 호출 실패');
      
      const files = await response.json();
      const htmlFiles = files.filter(file => 
        file.name.endsWith('.html') && file.name.toLowerCase() !== 'index.html'
      );

      menuContainer.innerHTML = '';

      if (htmlFiles.length === 0) {
        menuContainer.innerHTML = '<div class="loading">표시할 게임이 없습니다.</div>';
        return;
      }

      htmlFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = `nav-item ${index === 0 ? 'active' : ''}`;
        const displayName = file.name.replace('.html', '').replace(/_/g, ' ');
        
        div.innerHTML = `<span>${displayName}</span>`;
        div.onclick = () => changePage(div, file.name);
        menuContainer.appendChild(div);

        if (index === 0) {
          document.getElementById('contentFrame').src = file.name;
        }
      });
    } catch (error) {
      menuContainer.innerHTML = '<div class="loading">목록을 불러오지 못했습니다. (API 제한 확인)</div>';
    }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function changePage(el, url) {
    document.getElementById('contentFrame').src = url;
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    if (window.innerWidth <= 768) toggleSidebar();
  }

  loadFileList();
</script>

</body>
</html>
