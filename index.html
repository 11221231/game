<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Game Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #F5F5F7;
            --sidebar-bg: #1D1D1F;
            --accent: #0071E3;
            --text-main: #F5F5F7;
            --text-dim: #86868B;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --header-height: 60px;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); overflow: hidden; 
        }

        .container { display: flex; height: 100vh; }

        /* 사이드바 */
        .sidebar {
            width: 280px; background: var(--sidebar-bg); color: var(--text-main);
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 24px; }
        .sidebar-header h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

        .nav-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .nav-item {
            padding: 12px 16px; margin-bottom: 4px; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center;
            color: var(--text-dim); font-size: 15px; font-weight: 500;
        }
        .nav-item:hover { background: var(--glass); color: var(--text-main); }
        .nav-item.active { background: var(--accent); color: white; }

        /* 실시간 랭킹 영역 */
        .ranking-panel {
            margin: 20px 12px; padding: 20px; background: var(--glass);
            border-radius: var(--radius); border: 1px solid var(--border);
        }
        .ranking-title { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; }
        #rankList { font-size: 14px; line-height: 1.6; }
        .loading { color: var(--text-dim); font-style: italic; font-size: 12px; }

        /* 메인 콘텐츠 */
        .main-content { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* 모바일 대응 */
        .mobile-bar {
            display: none; height: var(--header-height); background: var(--sidebar-bg);
            color: white; align-items: center; padding: 0 20px; justify-content: space-between;
        }

        @media (max-width: 768px) {
            .mobile-bar { display: flex; }
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Arcade Hub</h1>
            </div>
            
            <nav class="nav-list" id="fileList">
                </nav>

            <div class="ranking-panel">
                <div class="ranking-title">Real-time Ranking</div>
                <div id="rankList">게임을 선택해주세요.</div>
            </div>
        </aside>

        <main class="main-content">
            <header class="mobile-bar">
                <div onclick="toggleSidebar()" style="cursor:pointer">Menu</div>
                <div style="font-weight:700">Arcade Hub</div>
                <div style="width:40px"></div>
            </header>
            <iframe id="contentFrame" src=""></iframe>
        </main>
    </div>

            if (games.length > 0) {
                document.getElementById('contentFrame').src = games[0].url;
                loadRankings(games[0].url);
            }
        }
