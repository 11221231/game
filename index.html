<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub & Leaderboard</title>
    <style>
        :root {
            --bg: #F5F5F7;
            --bg2: rgba(255, 255, 255, 0.8);
            --text: #1D1D1F;
            --accent: #0071E3;
            --radius: 20px;
            --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg2: rgba(28, 28, 30, 0.8);
                --text: #F5F5F7;
                --accent: #0A84FF;
            }
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 왼쪽: 게임 플레이 영역 */
        .game-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #game-frame {
            width: 100%;
            flex: 1;
            border: none;
            border-radius: var(--radius);
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 오른쪽: 사이드바 (게임 선택 및 랭킹) */
        .sidebar {
            width: 350px;
            background: var(--bg2);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(125,125,125,0.2);
            display: flex;
            flex-direction: column;
            padding: 25px;
            overflow-y: auto;
        }

        .menu-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        
        .game-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .game-btn {
            padding: 10px 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rank-item {
            background: rgba(125,125,125,0.1);
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rank-name { font-weight: 600; }
        .rank-score { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>

    <div class="game-section">
        <div class="game-selector" id="game-menu">
            </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div class="sidebar">
        <div class="menu-title">실시간 랭킹</div>
        <div id="leaderboard" class="rank-list">
            <div style="opacity: 0.5;">게임을 선택해 주세요.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        // 사용자가 업로드한 게임 파일이 Firestore(collection) 문법을 사용하므로 함께 초기화합니다.
        import { getFirestore, collection, addDoc, onSnapshot, query as fsQuery, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            authDomain: "game-c2924.firebaseapp.com",
            databaseURL: "https://game-c2924-default-rtdb.firebaseio.com",
            projectId: "game-c2924",
            storageBucket: "game-c2924.firebasestorage.app",
            messagingSenderId: "423929694317",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app); // 게임 파일 내의 parent.db가 참조할 객체

        // 전역 객체로 설정하여 iframe 내의 게임들이 접근할 수 있도록 함
        window.db = {
            collection: (name) => {
                return {
                    add: (data) => addDoc(collection(db, name), data)
                };
            }
        };

        // --- 게임 리스트 설정 (새 게임 추가 시 이 부분만 수정) ---
        const gameList = [
            { id: "rankings_forge", title: "무기 강화", file: "random forge2.html" },
            // { id: "rankings_clicker", title: "클리커 게임", file: "clicker.html" }
        ];

        const gameMenu = document.getElementById('game-menu');
        const gameFrame = document.getElementById('game-frame');
        const leaderboard = document.getElementById('leaderboard');

        gameList.forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'game-btn';
            btn.innerText = game.title;
            btn.onclick = () => loadGame(game);
            gameMenu.appendChild(btn);
        });

        function loadGame(game) {
            gameFrame.src = game.file;
            updateLeaderboard(game.id);
        }

        function updateLeaderboard(collectionName) {
            const q = fsQuery(collection(db, collectionName), orderBy("score", "desc"), limit(10));
            
            onSnapshot(q, (snapshot) => {
                leaderboard.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'rank-item';
                    item.innerHTML = `
                        <span class="rank-name">${data.name}</span>
                        <span class="rank-score">${data.score}</span>
                    `;
                    leaderboard.appendChild(item);
                });
            });
        }

        // 첫 번째 게임 자동 실행
        if(gameList.length > 0) loadGame(gameList[0]);
    </script>
</body>
</html>
