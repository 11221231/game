<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Game Hub</title>
    <style>
        :root {
            --bg: #F5F5F7;
            --bg2: rgba(255, 255, 255, 0.75);
            --bg3: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.08);
            --text: #1D1D1F;
            --accent: #0071E3;
            --green: #34C759;
            --radius: 22px;
            --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Text", sans-serif;
            --glass: saturate(180%) blur(20px);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg2: rgba(28, 28, 30, 0.65);
                --bg3: rgba(44, 44, 46, 0.85);
                --border: rgba(255, 255, 255, 0.1);
                --text: #F5F5F7;
                --accent: #0A84FF;
            }
        }

        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: var(--sans); display: flex; height: 100vh; overflow: hidden;
        }

        .game-area { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; }
        .game-nav { display: flex; gap: 10px; padding: 5px; overflow-x: auto; min-height: 50px; }
        
        .game-btn {
            background: var(--bg2); border: 1px solid var(--border); color: var(--text);
            padding: 8px 18px; border-radius: 12px; font-weight: 600; cursor: pointer;
            backdrop-filter: var(--glass); transition: all 0.2s; white-space: nowrap;
        }

        .game-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        #game-view { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); background: white; box-shadow: var(--shadow); }

        .sidebar { width: 340px; background: var(--bg3); border-left: 1px solid var(--border); backdrop-filter: var(--glass); display: flex; flex-direction: column; padding: 30px 20px; }
        .sidebar h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .rank-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .rank-item { background: var(--bg); border: 1px solid var(--border); padding: 14px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .rank-score { color: var(--green); font-weight: 700; font-family: monospace; }
        
        .loader { text-align: center; opacity: 0.5; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="game-area">
        <div class="game-nav" id="game-menu">
            <div class="loader">GitHub에서 게임을 찾는 중...</div>
        </div>
        <iframe id="game-view" src="" frameborder="0"></iframe>
    </div>

    <div class="sidebar">
        <h2 id="rank-title">Leaderboard</h2>
        <div id="leaderboard" class="rank-list">
            <div class="loader">게임을 선택해주세요.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 1. 사용자 정보 설정 (본인의 정보로 수정하세요) ---
        const GITHUB_USER = "본인의_아이디"; 
        const GITHUB_REPO = "저장소_이름";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            authDomain: "game-c2924.firebaseapp.com",
            databaseURL: "https://game-c2924-default-rtdb.firebaseio.com",
            projectId: "game-c2924",
            storageBucket: "game-c2924.firebasestorage.app",
            messagingSenderId: "423929694317",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 자식 Iframe(게임)을 위한 Firebase 브릿지
        window.db = {
            collection: (name) => ({ add: (data) => addDoc(collection(db, name), data) })
        };

        const menuEl = document.getElementById('game-menu');
        const viewEl = document.getElementById('game-view');
        const boardEl = document.getElementById('leaderboard');
        const titleEl = document.getElementById('rank-title');
        let currentUnsub = null;

        // --- 2. GitHub API를 통해 HTML 파일 목록 가져오기 ---
        async function fetchGames() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                const files = await response.json();
                
                menuEl.innerHTML = ''; // 로딩 메시지 제거

                // .html 파일만 필터링 (index.html 제외)
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                htmlFiles.forEach((file, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'game-btn';
                    btn.innerText = file.name.replace('.html', '').toUpperCase();
                    btn.onclick = () => loadGame(file.name, btn);
                    menuEl.appendChild(btn);

                    if(index === 0) loadGame(file.name, btn); // 첫 번째 게임 자동 실행
                });
            } catch (error) {
                menuEl.innerHTML = '<div class="loader">파일을 불러오지 못했습니다.</div>';
            }
        }

        function loadGame(fileName, btn) {
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // GitHub Pages 경로로 설정 (저장소 설정에서 GitHub Pages가 활성화되어 있어야 함)
            viewEl.src = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${fileName}`;
            titleEl.innerText = `${fileName.replace('.html', '')} 랭킹`;

            // 랭킹 연동 (파일명에서 확장자 제거한 이름을 컬렉션 명으로 사용)
            const colId = `rankings_${fileName.replace('.html', '').replace(/\s/g, '_')}`;
            if (currentUnsub) currentUnsub();
            
            const q = query(collection(db, colId), orderBy("score", "desc"), limit(10));
            currentUnsub = onSnapshot(q, (snapshot) => {
                boardEl.innerHTML = '';
                snapshot.docs.forEach((doc, idx) => {
                    const data = doc.data();
                    boardEl.innerHTML += `
                        <div class="rank-item">
                            <span><b>${idx+1}</b> ${data.name}</span>
                            <span class="rank-score">${data.score.toLocaleString()}</span>
                        </div>`;
                });
                if(snapshot.empty) boardEl.innerHTML = '<div class="loader">아직 기록이 없습니다.</div>';
            });
        }

        fetchGames();
    </script>
</body>
</html>
