<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Real-time Leaderboard</title>
    <style>
        /* 디자인 시스템 적용 */
        :root {
            --bg: #F5F5F7;
            --bg2: rgba(255, 255, 255, 0.75);
            --bg3: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.08);
            --text: #1D1D1F;
            --accent: #0071E3;
            --green: #34C759;
            --radius: 22px;
            --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Text", sans-serif;
            --glass: saturate(180%) blur(20px);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        /* 다크 모드 지원 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg2: rgba(28, 28, 30, 0.65);
                --bg3: rgba(44, 44, 46, 0.85);
                --border: rgba(255, 255, 255, 0.1);
                --text: #F5F5F7;
                --accent: #0A84FF;
            }
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 왼쪽: 게임 실행 영역 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .game-nav {
            display: flex;
            gap: 10px;
            padding: 5px;
            overflow-x: auto;
        }

        .game-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: var(--glass);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .game-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        #game-view {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            box-shadow: var(--shadow);
        }

        /* 오른쪽: 사이드바 (랭킹) */
        .sidebar {
            width: 360px;
            background: var(--bg3);
            border-left: 1px solid var(--border);
            backdrop-filter: var(--glass);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }

        .sidebar h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 24px 0;
            letter-spacing: -0.5px;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .rank-item {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rank-info { display: flex; align-items: center; gap: 12px; }
        .rank-num { color: var(--accent); font-weight: 800; font-size: 14px; width: 20px; }
        .rank-name { font-weight: 600; font-size: 16px; }
        .rank-score { font-family: "SF Mono", monospace; font-weight: 700; color: var(--green); }

        .empty-state {
            text-align: center;
            opacity: 0.4;
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="game-area">
        <div class="game-nav" id="game-menu">
            </div>
        <iframe id="game-view" src="" frameborder="0"></iframe>
    </div>

    <div class="sidebar">
        <h2 id="rank-title">실시간 랭킹</h2>
        <div id="leaderboard" class="rank-list">
            <div class="empty-state">게임을 로드하는 중...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            authDomain: "game-c2924.firebaseapp.com",
            databaseURL: "https://game-c2924-default-rtdb.firebaseio.com",
            projectId: "game-c2924",
            storageBucket: "game-c2924.firebasestorage.app",
            messagingSenderId: "423929694317",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. 게임 리스트 설정 ---
        // 여기에 새 게임을 추가하면 자동으로 버튼이 생기고 랭킹이 연동됩니다.
        const games = [
            { id: "rankings_forge", title: "⚔️ 무기 강화", file: "random forge2.html" },
            // 추가 예시: { id: "rankings_clicker", title: "🖱️ 클리커", file: "clicker.html" }
        ];

        // --- 2. iframe 내 게임을 위한 브릿지 설정 ---
        // 게임 파일(random forge2.html)의 parent.db.collection().add()가 작동하게 합니다.
        window.db = {
            collection: (name) => ({
                add: (data) => addDoc(collection(db, name), data)
            })
        };

        const menuEl = document.getElementById('game-menu');
        const viewEl = document.getElementById('game-view');
        const boardEl = document.getElementById('leaderboard');
        const titleEl = document.getElementById('rank-title');

        let currentUnsubscribe = null;

        // --- 3. UI 및 데이터 로직 ---
        function loadGame(game, btn) {
            // 버튼 활성화 스타일
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // iframe 로드
            viewEl.src = game.file;
            titleEl.innerText = `${game.title} 랭킹`;

            // 기존 실시간 리스너 해제 후 새 게임 랭킹 연결
            if (currentUnsubscribe) currentUnsubscribe();
            
            const q = query(collection(db, game.id), orderBy("score", "desc"), limit(10));
            currentUnsubscribe = onSnapshot(q, (snapshot) => {
                boardEl.innerHTML = '';
                if (snapshot.empty) {
                    boardEl.innerHTML = '<div class="empty-state">아직 기록이 없습니다.</div>';
                    return;
                }

                snapshot.docs.forEach((doc, index) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'rank-item';
                    item.innerHTML = `
                        <div class="rank-info">
                            <span class="rank-num">${index + 1}</span>
                            <span class="rank-name">${data.name}</span>
                        </div>
                        <div class="rank-score">${data.score.toLocaleString()}</div>
                    `;
                    boardEl.appendChild(item);
                });
            });
        }

        // 메뉴 생성
        games.forEach((game, idx) => {
            const btn = document.createElement('button');
            btn.className = 'game-btn';
            btn.innerText = game.title;
            btn.onclick = () => loadGame(game, btn);
            menuEl.appendChild(btn);
            
            // 첫 번째 게임 실행
            if (idx === 0) loadGame(game, btn);
        });
    </script>
</body>
</html>
