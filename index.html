<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Leaderboard</title>
    <style>
        /* 디자인 시스템 적용 */
        :root {
            --bg: #F5F5F7;
            --bg2: rgba(255, 255, 255, 0.75);
            --bg3: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.08);
            --text: #1D1D1F;
            --accent: #0071E3;
            --green: #34C759;
            --radius: 18px;
            --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Text", sans-serif;
            --glass: saturate(180%) blur(20px);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        /* 다크 모드 자동 전환 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg2: rgba(28, 28, 30, 0.65);
                --bg3: rgba(44, 44, 46, 0.85);
                --border: rgba(255, 255, 255, 0.1);
                --text: #F5F5F7;
                --accent: #0A84FF;
            }
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 17px;
            opacity: 0.6;
            margin: 0;
        }

        /* 랭킹 리스트 영역 */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .rank-card {
            background: var(--bg2);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            padding: 18px 24px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 상위권 강조 */
        .rank-1 { border: 2px solid #FFD700; background: var(--bg3); }
        .rank-2 { border: 1.5px solid #C0C0C0; }
        .rank-3 { border: 1.5px solid #CD7F32; }

        .info-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .rank-number {
            font-size: 14px;
            font-weight: 800;
            color: var(--accent);
            width: 24px;
        }

        .name {
            font-size: 17px;
            font-weight: 600;
        }

        .score {
            font-family: "SF Mono", ui-monospace, monospace;
            font-weight: 700;
            font-size: 17px;
            color: var(--green);
        }

        /* 입력 패널 */
        .input-panel {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            border-radius: 12px;
            flex: 1;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .loading-text {
            text-align: center;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Leaderboard</h1>
            <p>실시간 랭킹 시스템</p>
        </header>

        <div id="leaderboard" class="card-list">
            <div class="loading-text">데이터를 불러오는 중...</div>
        </div>

        <div class="input-panel">
            <div class="input-group">
                <input type="text" id="userName" placeholder="플레이어 이름" maxlength="12">
                <input type="number" id="userScore" placeholder="점수">
            </div>
            <button id="submitBtn">기록 등록하기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase 설정 적용
        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            authDomain: "game-c2924.firebaseapp.com",
            databaseURL: "https://game-c2924-default-rtdb.firebaseio.com",
            projectId: "game-c2924",
            storageBucket: "game-c2924.firebasestorage.app",
            messagingSenderId: "423929694317",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const rankRef = ref(db, 'ranks');

        // 1. 데이터 추가 로직
        const submitBtn = document.getElementById('submitBtn');
        const nameInput = document.getElementById('userName');
        const scoreInput = document.getElementById('userScore');

        submitBtn.onclick = () => {
            const name = nameInput.value.trim();
            const score = parseInt(scoreInput.value);

            if (!name || isNaN(score)) {
                alert("이름과 올바른 점수를 입력해 주세요.");
                return;
            }

            const newPostRef = push(rankRef);
            set(newPostRef, {
                name: name,
                score: score,
                timestamp: Date.now()
            }).then(() => {
                nameInput.value = '';
                scoreInput.value = '';
            });
        };

        // 2. 실시간 랭킹 업데이트 로직 (상위 10개)
        const leaderboard = document.getElementById('leaderboard');
        const topRanksQuery = query(rankRef, orderByChild('score'), limitToLast(10));

        onValue(topRanksQuery, (snapshot) => {
            leaderboard.innerHTML = '';
            const tempArray = [];

            snapshot.forEach((child) => {
                tempArray.push(child.val());
            });

            // 내림차순 정렬 (높은 점수가 위로)
            tempArray.reverse().forEach((data, index) => {
                const rank = index + 1;
                const card = document.createElement('div');
                
                // 순위별 스타일 클래스 추가
                let rankClass = 'rank-card';
                if (rank <= 3) rankClass += ` rank-${rank}`;
                card.className = rankClass;

                card.innerHTML = `
                    <div class="info-group">
                        <span class="rank-number">${rank}</span>
                        <span class="name">${data.name}</span>
                    </div>
                    <div class="score">${data.score.toLocaleString()} PT</div>
                `;
                leaderboard.appendChild(card);
            });

            if (tempArray.length === 0) {
                leaderboard.innerHTML = '<div class="loading-text">등록된 기록이 없습니다. 첫 기록을 남겨보세요!</div>';
            }
        });
    </script>
</body>
</html>
