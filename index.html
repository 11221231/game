<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Infinite Leaderboard</title>
    <style>
        /* 디자인 시스템 적용 (애플 스타일) */
        :root {
            --bg: #F5F5F7;
            --bg2: rgba(255, 255, 255, 0.75);
            --bg3: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.08);
            --text: #1D1D1F;
            --accent: #0071E3;
            --green: #34C759;
            --radius: 22px;
            --sans: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Text", sans-serif;
            --glass: saturate(180%) blur(20px);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg2: rgba(28, 28, 30, 0.65);
                --bg3: rgba(44, 44, 46, 0.85);
                --border: rgba(255, 255, 255, 0.1);
                --text: #F5F5F7;
                --accent: #0A84FF;
            }
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 왼쪽: 게임 영역 */
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 16px;
        }

        .hub-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hub-header h1 { font-size: 24px; font-weight: 700; margin: 0; }

        .game-menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px;
        }

        .menu-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: var(--glass);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .menu-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        #game-frame {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            box-shadow: var(--shadow);
        }

        /* 오른쪽: 사이드바 (랭킹) */
        .sidebar {
            width: 360px;
            background: var(--bg3);
            border-left: 1px solid var(--border);
            backdrop-filter: var(--glass);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }

        .sidebar h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 20px 0;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .rank-card {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .player-info { display: flex; align-items: center; gap: 12px; }
        .player-rank { color: var(--accent); font-weight: 800; font-size: 14px; width: 18px; }
        .player-name { font-weight: 600; }
        .player-score { font-family: "SF Mono", monospace; font-weight: 700; color: var(--green); }

        .empty-msg { text-align: center; opacity: 0.4; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="hub-header">
            <h1>Game Hub</h1>
            <div class="game-menu" id="game-menu">
                </div>
        </div>
        <iframe id="game-frame" src="" frameborder="0"></iframe>
    </div>

    <div class="sidebar">
        <h2 id="current-game-title">Leaderboard</h2>
        <div id="rank-container" class="rank-list">
            <div class="empty-msg">게임을 로드 중입니다...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            authDomain: "game-c2924.firebaseapp.com",
            databaseURL: "https://game-c2924-default-rtdb.firebaseio.com",
            projectId: "game-c2924",
            storageBucket: "game-c2924.firebasestorage.app",
            messagingSenderId: "423929694317",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /**
         * 1. 게임 리스트 설정 (자동 확장 가능)
         * 신규 게임을 추가할 때는 이 배열에 정보만 추가하면 메뉴와 랭킹이 자동 생성됩니다.
         */
        const gameSettings = [
            { id: "rankings_forge", title: "⚔️ 무기 강화", file: "random forge2.html" },
            // { id: "rankings_clicker", title: "🖱️ 클리커", file: "clicker.html" }
        ];

        /**
         * 2. 자식 Iframe(게임 파일)을 위한 데이터베이스 브릿지
         * random forge2.html 내부의 parent.db.collection().add() 호출을 처리합니다.
         */
        window.db = {
            collection: (colName) => ({
                add: (data) => addDoc(collection(db, colName), data)
            })
        };

        const menuBox = document.getElementById('game-menu');
        const iframe = document.getElementById('game-frame');
        const rankBox = document.getElementById('rank-container');
        const titleBox = document.getElementById('current-game-title');

        let currentUnsub = null;

        // 게임 로드 및 랭킹 실시간 연동 함수
        function activateGame(game, btn) {
            // UI 업데이트
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            titleBox.innerText = `${game.title} 랭킹`;
            
            // Iframe 소스 변경 (게임 실행)
            iframe.src = game.file;

            // 실시간 랭킹 구독 (Firestore)
            if (currentUnsub) currentUnsub(); // 기존 게임 구독 해제
            
            const q = query(collection(db, game.id), orderBy("score", "desc"), limit(10));
            currentUnsubscribe = onSnapshot(q, (snapshot) => {
                rankBox.innerHTML = '';
                if (snapshot.empty) {
                    rankBox.innerHTML = '<div class="empty-msg">기록이 없습니다.</div>';
                    return;
                }

                snapshot.docs.forEach((doc, idx) => {
                    const item = doc.data();
                    const card = document.createElement('div');
                    card.className = 'rank-card';
                    card.innerHTML = `
                        <div class="player-info">
                            <span class="player-rank">${idx + 1}</span>
                            <span class="player-name">${item.name}</span>
                        </div>
                        <div class="player-score">${item.score.toLocaleString()}</div>
                    `;
                    rankBox.appendChild(card);
                });
            });
        }

        // 초기 메뉴 생성
        gameSettings.forEach((game, index) => {
            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.innerText = game.title;
            btn.onclick = () => activateGame(game, btn);
            menuBox.appendChild(btn);
            
            // 첫 번째 게임 자동 시작
            if (index === 0) activateGame(game, btn);
        });
    </script>
</body>
</html>
