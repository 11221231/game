<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Game Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --primary: #2563eb;
            --dark: #0f172a;
            --header-height: 60px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            background: #f8fafc;
            overflow: hidden;
        }

        .mobile-header {
            display: none;
            height: var(--header-height);
            background: var(--dark);
            color: white;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: space-between;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 사이드바 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .brand {
            padding: 30px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #60a5fa;
            border-bottom: 1px solid #1e293b;
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            color: #94a3b8;
            border-left: 4px solid transparent;
            transition: 0.2s;
        }

            .nav-item:hover {
                background: #1e293b;
                color: white;
            }

            .nav-item.active {
                background: #1e293b;
                color: white;
                border-left-color: var(--primary);
            }

            .nav-item span {
                display: block;
                font-size: 0.9rem;
                word-break: break-all;
            }

        /* 랭킹 컨테이너 */
        #ranking-container {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
        }

            #ranking-container h3 {
                font-size: 14px;
                color: #94a3b8;
                margin: 0 0 15px 0;
                display: flex;
                align-items: center;
            }

        #rank-list {
            font-size: 13px;
            color: #e2e8f0;
            line-height: 1.8;
            min-height: 100px;
        }

        .loading {
            padding: 10px;
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
        }

        .main-content {
            flex: 1;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }

                .sidebar.open {
                    transform: translateX(0);
                }

            .main-content {
                padding-top: var(--header-height);
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }

                .overlay.show {
                    display: block;
                }
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <div style="font-weight: bold; color: #60a5fa;">Flash Game</div>
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        <nav class="sidebar" id="sidebar">
            <div class="brand">Flash Game</div>
            <div class="nav-menu" id="dynamicMenu">
                <div class="loading">파일 목록 불러오는 중...</div>
            </div>

            <div id="ranking-container">
                <h3>🏆 실시간 랭킹</h3>
                <div id="rank-list">
                    <div class="loading">게임을 선택해주세요.</div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <iframe id="contentFrame" src=""></iframe>
        </main>
    </div>

    <script>
        const USERNAME = "11221231";
        const REPO = "game";

        // 1. Firebase 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyAODEbMA_GBeksqrlNRMhwtNdLjNSvgwSw",
            projectId: "game-c2924",
            appId: "1:423929694317:web:e995dcf1ad70f146629764"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 2. 파일 목록 불러오기
        async function loadFileList() {
            const menuContainer = document.getElementById('dynamicMenu');
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const files = await response.json();

                const htmlFiles = files.filter(file =>
                    file.name.endsWith('.html') && file.name !== 'index.html'
                );

                menuContainer.innerHTML = '';

                htmlFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = `nav-item ${index === 0 ? 'active' : ''}`;
                    const displayName = file.name.replace('.html', '').replace(/_/g, ' ');

                    div.innerHTML = `<span>${displayName}</span>`;
                    div.onclick = () => changePage(div, file.name);
                    menuContainer.appendChild(div);

                    if (index === 0) {
                        document.getElementById('contentFrame').src = file.name;
                        loadRankings(file.name); // 첫 번째 게임 랭킹 로드
                    }
                });
            } catch (error) {
                menuContainer.innerHTML = '<div class="loading">목록을 불러오지 못했습니다.</div>';
                console.error(error);
            }
        }

        // 3. 랭킹 데이터 로드
        let unsubscribeRank = null; // 이전 리스너 해제용

        function loadRankings(gameName) {
            const rankList = document.getElementById('rank-list');
            rankList.innerHTML = '<div class="loading">불러오는 중...</div>';

            if (unsubscribeRank) unsubscribeRank(); // 이전 게임 구독 해제

            const collectionId = gameName.includes('forge') ? "rankings_forge" : "rankings_" + gameName.replace('.html', '').replace(/\s/g, '_');

            unsubscribeRank = db.collection(collectionId)
                .orderBy("score", "desc")
                .limit(5)
                .onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        rankList.innerHTML = '<div class="loading">첫 번째 랭커가 되어보세요!</div>';
                        return;
                    }
                    let html = "";
                    let rank = 1;
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const unit = gameName.includes('forge') ? '강' : '점';
                        html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>${rank++}. ${data.name}</span>
                        <span style="color: #fbbf24; font-weight:bold;">${data.score}${unit}</span>
                      </div>`;
                    });
                    rankList.innerHTML = html;
                }, (error) => {
                    console.error("Ranking Load Error:", error);
                    rankList.innerHTML = '<div class="loading">랭킹 정보 없음</div>';
                });
        }

        // 4. 페이지 전환
        function changePage(el, url) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('contentFrame').src = url;
            loadRankings(url);
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        loadFileList();
    </script>

</body>
</html>
